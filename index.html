<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台股精算 Pro - 編輯與精算版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        :root { --up-color: #f43f5e; --down-color: #10b981; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .up-red { color: var(--up-color); }
        .down-green { color: var(--down-color); }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .iframe-container { width: 100%; height: 350px; border-radius: 1.5rem; overflow: hidden; border: 1px solid #e2e8f0; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsT-DHIht7TASNmb7GrUzJdAVxIlNNIMw",
            authDomain: "stock-d7721.firebaseapp.com",
            projectId: "stock-d7721",
            storageBucket: "stock-d7721.firebasestorage.app",
            messagingSenderId: "238076969385",
            appId: "1:238076969385:web:10428fe81c77e51b8584b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, stocks = [], watchlist = [], currentPrices = {}, chartInstance = null;
        let editingId = null; // 用於判斷目前是否在編輯狀態

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                await loadUserData();
                startSync();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-page').classList.add('hidden');
            }
        });

        async function loadUserData() {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                stocks = data.stocks || []; watchlist = data.watchlist || [];
            }
            render();
        }

        async function saveUserData() { await setDoc(doc(db, "users", currentUser.uid), { stocks, watchlist }); }

        // 精算損益函數 (考慮手續費折讓與證交稅)
        function calculateNet(code, shares, cost, nowPrice) {
            const isETF = code.startsWith('00') || code.startsWith('01');
            const taxRate = isETF ? 0.001 : 0.003; // ETF 0.1%, 股票 0.3%
            const feeRate = 0.001425 * 0.6; // 手續費 0.1425% 搭配 6 折
            
            const buyTotal = shares * cost;
            const sellTotal = shares * nowPrice;
            
            const buyFee = Math.max(1, Math.floor(buyTotal * feeRate));
            const sellFee = Math.max(1, Math.floor(sellTotal * feeRate));
            const tax = Math.floor(sellTotal * taxRate);
            
            const profit = sellTotal - buyTotal - buyFee - sellFee - tax;
            const roi = buyTotal > 0 ? (profit / (buyTotal + buyFee) * 100).toFixed(2) : 0;
            
            return { profit: Math.round(profit), roi };
        }

        window.fetchPrice = async (code) => {
            const symbols = [`${code}.TW`, `${code}.TWO`];
            for(let sym of symbols) {
                try {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}`)}`);
                    const json = await res.json();
                    const data = JSON.parse(json.contents);
                    if(data.chart.result) {
                        const m = data.chart.result[0].meta;
                        currentPrices[code] = { 
                            price: m.regularMarketPrice, 
                            prev: m.previousClose, 
                            pct: ((m.regularMarketPrice - m.previousClose) / m.previousClose * 100).toFixed(2),
                            exchange: sym.includes('.TWO') ? 'OTC' : 'TWSE'
                        };
                        render(); break;
                    }
                } catch(e) {}
            }
        };

        window.fetchAllData = () => {
            const allCodes = [...new Set([...stocks.map(s => s.code), ...watchlist.map(w => w.code)])];
            allCodes.forEach(fetchPrice);
            document.getElementById('update-time').innerText = `Updated: ${new Date().toLocaleTimeString()}`;
        };

        function startSync() { fetchAllData(); setInterval(fetchAllData, 30000); }

        function render() {
            const inv = document.getElementById('p-inv');
            inv.innerHTML = '';
            let gV = 0, gP = 0, gPaid = 0;

            const sum = {};
            stocks.forEach(s => {
                if(!sum[s.code]) sum[s.code] = { name: s.name, shares: 0, cost: 0, info: currentPrices[s.code] || { price: 0, prev: 0, pct: 0 } };
                sum[s.code].shares += s.shares; sum[s.code].cost += (s.shares * s.cost);
            });

            Object.keys(sum).sort().forEach(code => {
                const s = sum[code];
                const net = calculateNet(code, s.shares, s.cost / s.shares, s.info.price);
                gV += (s.shares * s.info.price); gPaid += s.cost; gP += net.profit;

                inv.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl mb-3 border border-slate-100 shadow-sm flex justify-between items-center" onclick="openStockDetails('${code}')">
                        <div class="flex-1 min-w-0">
                            <p class="font-extrabold text-slate-800 text-lg truncate-name">${s.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold tracking-widest">${code} · ${s.shares.toLocaleString()} 股</p>
                        </div>
                        <div class="text-right">
                            <p class="${net.profit >= 0 ? 'up-red' : 'down-green'} text-lg font-extrabold font-mono">${net.profit > 0 ? '+' : ''}${net.profit.toLocaleString()}</p>
                            <p class="text-[10px] font-bold ${net.profit >= 0 ? 'text-red-400' : 'text-green-400'}">${net.roi}%</p>
                        </div>
                    </div>`;
            });
            document.getElementById('total-v').innerText = `NT$ ${Math.round(gV).toLocaleString()}`;
            document.getElementById('total-p').innerText = `${gP >= 0 ? '+' : ''}${Math.round(gP).toLocaleString()} (${gPaid > 0 ? ((gP/gPaid)*100).toFixed(2) : '0'}%)`;
            document.getElementById('total-p').className = `text-sm font-extrabold px-3 py-1 rounded-full ${gP >= 0 ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-500'}`;
        }

        window.openStockDetails = (code) => {
            const info = currentPrices[code] || { exchange: 'TWSE' };
            const name = stocks.find(s => s.code === code)?.name || code;
            document.getElementById('modal-title').innerText = `${name} (${code})`;
            
            // 修正 TradingView 嵌入邏輯
            const exch = info.exchange === 'OTC' ? 'OTC' : 'TWSE';
            const tvUrl = `https://s.tradingview.com/widgetembed/?symbol=${exch}:${code}&interval=D&hidesidetoolbar=1&theme=light&style=1&timezone=Asia%2FTaipei&locale=zh_TW`;
            
            document.getElementById('tv-frame-container').innerHTML = `
                <div class="iframe-container mb-6 shadow-inner">
                    <iframe src="${tvUrl}" width="100%" height="100%" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
                </div>
                <div class="space-y-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">交易紀錄</p>
                    ${stocks.filter(s => s.code === code).map(r => `
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <div>
                                <p class="text-xs font-bold text-slate-700">${r.shares.toLocaleString()} 股 @ ${r.cost}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="startEdit(${r.id})" class="text-[10px] bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-full font-bold">修改</button>
                                <button onclick="deleteTx(${r.id})" class="text-[10px] bg-red-100 text-red-500 px-3 py-1.5 rounded-full font-bold">刪除</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.remove('hidden');
        };

        // 啟動編輯模式
        window.startEdit = (id) => {
            const tx = stocks.find(s => s.id === id);
            if (!tx) return;
            editingId = id;
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('add-details').open = true;
            document.getElementById('s-code').value = tx.code;
            document.getElementById('s-name').value = tx.name;
            document.getElementById('s-shares').value = tx.shares;
            document.getElementById('s-cost').value = tx.cost;
            document.querySelector('#add-details summary').innerText = "📝 正在修改紀錄...";
            window.scrollTo(0, document.body.scrollHeight);
        };

        window.saveTransaction = async () => {
            const code = document.getElementById('s-code').value.trim();
            const name = document.getElementById('s-name').value.trim();
            const shares = parseFloat(document.getElementById('s-shares').value);
            const cost = parseFloat(document.getElementById('s-cost').value);
            
            if(code && shares && cost) {
                if (editingId) {
                    // 修改舊紀錄
                    const idx = stocks.findIndex(s => s.id === editingId);
                    stocks[idx] = { ...stocks[idx], code, name: name || code, shares, cost };
                    editingId = null;
                } else {
                    // 新增紀錄
                    stocks.push({ id: Date.now(), code, name: name || code, shares, cost });
                }
                await saveUserData();
                resetForm(); fetchAllData();
            }
        };

        window.resetForm = () => {
            editingId = null;
            document.getElementById('s-code').value=''; document.getElementById('s-name').value='';
            document.getElementById('s-shares').value=''; document.getElementById('s-cost').value='';
            document.getElementById('add-details').open = false;
            document.querySelector('#add-details summary').innerText = "＋ 新增庫存紀錄";
        };

        window.deleteTx = async (id) => { if(confirm('確定刪除此筆交易？')) { stocks = stocks.filter(s => s.id !== id); await saveUserData(); render(); closeModal(); } };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.logout = () => signOut(auth);
        window.authAction = async () => {
            const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("登入失敗"); }
        };
    </script>
</head>
<body class="pb-32 bg-[#F8FAFC]">

    <div id="auth-page" class="flex flex-col items-center justify-center min-h-screen p-8 bg-slate-900 text-center">
        <h1 class="text-white text-3xl font-black mb-8">台股精算 <span class="text-indigo-500">Pro</span></h1>
        <div class="w-full max-w-sm space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-800 text-white outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-800 text-white outline-none">
            <button onclick="authAction()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black">進入系統</button>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <header class="px-6 pt-12 pb-6 sticky top-0 bg-[#F8FAFC]/90 backdrop-blur-md z-30">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Portfolio Value</p>
                    <h2 id="total-v" class="text-3xl font-black text-slate-900 tracking-tighter tabular-nums leading-none mb-2">NT$ 0</h2>
                    <div id="total-p">--</div>
                </div>
                <button onclick="logout()" class="w-12 h-12 rounded-2xl bg-white shadow-sm border border-slate-100 flex items-center justify-center">🚪</button>
            </div>
        </header>

        <main class="px-6">
            <div id="p-inv"></div>
            <p id="update-time" class="text-center text-[9px] text-slate-300 font-bold mt-10 tracking-widest uppercase"></p>
        </main>

        <div id="floating-add-area" class="fixed bottom-8 left-0 right-0 px-6 z-40">
            <details id="add-details" class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
                <summary class="p-5 text-center font-black text-indigo-600 cursor-pointer">＋ 新增庫存紀錄</summary>
                <div class="p-8 space-y-4 border-t border-slate-50">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="s-code" placeholder="股票代碼" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm">
                        <input type="text" id="s-name" placeholder="名稱" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="s-shares" placeholder="股數" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm">
                        <input type="number" id="s-cost" placeholder="買入成本" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="resetForm()" class="flex-1 bg-slate-100 text-slate-500 p-4 rounded-2xl font-black">取消</button>
                        <button onclick="saveTransaction()" class="flex-[2] bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-indigo-200">儲存資料</button>
                    </div>
                </div>
            </details>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-black text-slate-900"></h3>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center">✕</button>
            </div>
            <div id="tv-frame-container"></div>
        </div>
    </div>
</body>
</html>
