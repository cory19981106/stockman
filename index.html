<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台股精算 - 管理模式</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .profit-pos { color: #ef4444; }
        .profit-neg { color: #22c55e; }
        @keyframes flash-up { from { background-color: rgba(239, 68, 68, 0.2); } to { background-color: transparent; } }
        @keyframes flash-down { from { background-color: rgba(34, 197, 94, 0.2); } to { background-color: transparent; } }
        .price-up { animation: flash-up 1s ease-out; }
        .price-down { animation: flash-down 1s ease-out; }
        .live-dot { width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; margin-right: 4px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        /* 隱藏捲軸但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased pb-32">
    <div class="max-w-md mx-auto p-4">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-bold flex items-center"><span class="live-dot"></span> 實時監控</h1>
                <p id="last-update" class="text-[10px] text-slate-400 font-mono">最後更新: --:--:--</p>
            </div>
            <button onclick="fetchAllPrices()" class="bg-white border shadow-sm p-2 rounded-lg">🔄</button>
        </div>

        <div class="bg-indigo-600 p-6 rounded-3xl shadow-xl text-white mb-6">
            <p class="text-indigo-200 text-xs font-medium mb-1">總資產淨值</p>
            <h2 id="total-value" class="text-3xl font-black font-mono">NT$ 0</h2>
            <div class="flex gap-3 mt-3">
                <span id="total-profit" class="text-sm font-bold bg-white/20 px-2 py-1 rounded-lg">--</span>
                <span id="total-percent" class="text-sm font-bold bg-white/20 px-2 py-1 rounded-lg">--%</span>
            </div>
        </div>

        <div id="stock-container" class="space-y-4"></div>

        <div class="fixed bottom-6 left-0 right-0 px-4">
            <details class="max-w-md mx-auto bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
                <summary class="list-none p-4 text-center font-bold text-indigo-600 cursor-pointer active:bg-slate-50">➕ 新增持股紀錄</summary>
                <div class="p-4 space-y-3 border-t bg-slate-50">
                    <input type="text" id="s-code" placeholder="股票代碼 (如 2330)" class="w-full bg-white border p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="s-shares" placeholder="買入股數" class="bg-white border p-3 rounded-xl outline-none">
                        <input type="number" id="s-cost" placeholder="買入單價" class="bg-white border p-3 rounded-xl outline-none">
                    </div>
                    <button onclick="addTransaction()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-lg">確認存入</button>
                </div>
            </details>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-6 pb-12 animate-slide-up">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modal-title" class="text-xl font-black">詳細紀錄</h3>
                <button onclick="closeModal()" class="text-slate-400 text-2xl">✕</button>
            </div>
            <div id="modal-content" class="space-y-3 max-h-[60vh] overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('stock_tx_v3')) || [];
        let currentPrices = JSON.parse(localStorage.getItem('stock_prices_v3')) || {};
        let oldPrices = {};

        const getTaxRate = (code) => code.startsWith('00') ? 0.001 : 0.003;
        const calculateFee = (amount) => Math.max(20, Math.floor(amount * 0.001425 * 0.6));

        function addTransaction() {
            const code = document.getElementById('s-code').value.trim();
            const shares = parseFloat(document.getElementById('s-shares').value);
            const cost = parseFloat(document.getElementById('s-cost').value);
            if (code && shares && cost) {
                transactions.push({ id: Date.now(), code, shares, cost, totalCost: (shares * cost) + calculateFee(shares * cost) });
                localStorage.setItem('stock_tx_v3', JSON.stringify(transactions));
                document.getElementById('s-code').value = '';
                document.querySelector('details').open = false;
                render();
                fetchPrice(code);
            }
        }

        async function fetchPrice(code) {
            const symbol = code + (code.length === 4 ? ".TW" : ".TWO");
            const url = `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const newPrice = data.chart.result[0].meta.regularMarketPrice;
                oldPrices[code] = currentPrices[code];
                currentPrices[code] = newPrice;
                localStorage.setItem('stock_prices_v3', JSON.stringify(currentPrices));
                render();
            } catch (e) { console.error(code + " 更新失敗"); }
        }

        function fetchAllPrices() {
            [...new Set(transactions.map(t => t.code))].forEach(code => fetchPrice(code));
            document.getElementById('last-update').innerText = `最後更新: ${new Date().toLocaleTimeString()}`;
        }

        function render() {
            const container = document.getElementById('stock-container');
            container.innerHTML = '';
            const summary = {};
            transactions.forEach(tx => {
                if (!summary[tx.code]) summary[tx.code] = { totalShares: 0, totalCostAmount: 0 };
                summary[tx.code].totalShares += tx.shares;
                summary[tx.code].totalCostAmount += tx.totalCost;
            });

            let gTotalValue = 0, gTotalCost = 0;
            Object.keys(summary).sort().forEach(code => {
                const s = summary[code];
                const price = currentPrices[code] || 0;
                const sellValue = (s.totalShares * price) - calculateFee(s.totalShares * price) - Math.floor(s.totalShares * price * getTaxRate(code));
                const profit = sellValue - s.totalCostAmount;
                const pct = (profit / s.totalCostAmount * 100).toFixed(2);
                gTotalValue += sellValue; gTotalCost += s.totalCostAmount;

                let flashClass = (oldPrices[code] && price > oldPrices[code]) ? "price-up" : (oldPrices[code] && price < oldPrices[code] ? "price-down" : "");

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center ${flashClass}">
                        <div onclick="openEditModal('${code}')" class="flex-1 cursor-pointer">
                            <p class="text-lg font-black">${code} <span class="text-[10px] text-indigo-500 font-normal">詳細 ▸</span></p>
                            <p class="text-[10px] text-slate-400">持股: ${s.totalShares.toLocaleString()} | 均價: ${(s.totalCostAmount/s.totalShares).toFixed(1)}</p>
                        </div>
                        <div class="text-right flex items-center gap-3">
                            <div>
                                <p class="text-xl font-mono font-bold">${price.toFixed(2)}</p>
                                <p class="text-xs font-bold ${profit >= 0 ? 'profit-pos' : 'profit-neg'}">${profit >= 0 ? '+' : ''}${Math.round(profit).toLocaleString()} (${pct}%)</p>
                            </div>
                            <button onclick="confirmDeleteCode('${code}')" class="text-slate-200 hover:text-red-400 p-2 text-xl">✕</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-value').innerText = `NT$ ${Math.round(gTotalValue).toLocaleString()}`;
            const totalProfit = gTotalValue - gTotalCost;
            document.getElementById('total-profit').innerText = `${totalProfit >= 0 ? '+' : ''}${Math.round(totalProfit).toLocaleString()}`;
            document.getElementById('total-percent').innerText = `${gTotalCost === 0 ? 0 : (totalProfit / gTotalCost * 100).toFixed(2)}%`;
        }

        function openEditModal(code) {
            const modal = document.getElementById('edit-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = `${code} 歷史交易`;
            
            const records = transactions.filter(t => t.code === code);
            content.innerHTML = records.map(r => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl">
                    <div>
                        <p class="text-sm font-bold">${r.shares.toLocaleString()} 股 @ ${r.cost}</p>
                        <p class="text-[10px] text-slate-400">${new Date(r.id).toLocaleDateString()}</p>
                    </div>
                    <button onclick="deleteTransaction(${r.id})" class="text-red-500 text-sm font-medium">刪除此筆</button>
                </div>
            `).join('');
            
            modal.classList.remove('hidden');
        }

        function deleteTransaction(id) {
            if(confirm('確定刪除這筆交易紀錄？')) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('stock_tx_v3', JSON.stringify(transactions));
                render();
                if (transactions.length === 0 || !transactions.some(t => t.code === document.getElementById('modal-title').innerText.split(' ')[0])) {
                    closeModal();
                } else {
                    openEditModal(document.getElementById('modal-title').innerText.split(' ')[0]);
                }
            }
        }

        function confirmDeleteCode(code) {
            if(confirm(`確定清空 ${code} 的所有持股紀錄？`)) {
                transactions = transactions.filter(t => t.code !== code);
                localStorage.setItem('stock_tx_v3', JSON.stringify(transactions));
                render();
            }
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        setInterval(fetchAllPrices, 30000);
        render();
        if(transactions.length > 0) fetchAllPrices();
    </script>
</body>
</html>
