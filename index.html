<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的雲端台股精算</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .profit-pos { color: #ef4444; font-weight: 900; }
        .profit-neg { color: #22c55e; font-weight: 900; }
        @keyframes flash-up { from { background-color: rgba(239, 68, 68, 0.2); } to { background-color: transparent; } }
        @keyframes flash-down { from { background-color: rgba(34, 197, 94, 0.2); } to { background-color: transparent; } }
        .price-up { animation: flash-up 1.2s ease-out; }
        .price-down { animation: flash-down 1.2s ease-out; }
        .live-dot { width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: blink 1s infinite; margin-right: 6px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 使用你提供的專屬金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyDsT-DHIht7TASNmb7GrUzJdAVxIlNNIMw",
            authDomain: "stock-d7721.firebaseapp.com",
            projectId: "stock-d7721",
            storageBucket: "stock-d7721.firebasestorage.app",
            messagingSenderId: "238076969385",
            appId: "1:238076969385:web:10428fe81c77e51b8584b8",
            measurementId: "G-9RE7BBEH6M"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 核心變數 ---
        let currentUser = null;
        let stocks = [];
        let currentPrices = {};
        let oldPrices = {};

        // --- 登入/註冊功能 ---
        window.authAction = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("請輸入帳號密碼");
            try {
                if(type === 'reg') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("錯誤: " + e.message); }
        };

        window.logout = () => signOut(auth);

        // --- 狀態監控 ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                await syncFromCloud();
                fetchAllPrices();
            } else {
                currentUser = null;
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-page').classList.add('hidden');
            }
        });

        // --- 資料雲端同步 ---
        async function syncToCloud() {
            if(!currentUser) return;
            await setDoc(doc(db, "users", currentUser.uid), { stocks });
            render();
        }

        async function syncFromCloud() {
            const docRef = doc(db, "users", currentUser.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) stocks = docSnap.data().stocks || [];
            render();
        }

        // --- 股票功能 ---
        window.addTransaction = async () => {
            const code = document.getElementById('s-code').value.trim();
            const name = document.getElementById('s-name').value.trim();
            const shares = parseFloat(document.getElementById('s-shares').value);
            const cost = parseFloat(document.getElementById('s-cost').value);
            if(code && shares && cost) {
                const buyFee = Math.max(20, Math.floor(shares * cost * 0.001425 * 0.6));
                stocks.push({ id: Date.now(), code, name: name || code, shares, cost, totalCost: (shares * cost) + buyFee });
                document.getElementById('s-code').value = '';
                document.getElementById('s-name').value = '';
                document.getElementById('s-shares').value = '';
                document.getElementById('s-cost').value = '';
                document.querySelector('details').open = false;
                await syncToCloud();
                fetchPrice(code);
            }
        };

        window.deleteTx = async (id) => {
            stocks = stocks.filter(s => s.id !== id);
            await syncToCloud();
        };

        window.deleteCode = async (code) => {
            if(confirm(`確定清空 ${code} 的所有紀錄？`)) {
                stocks = stocks.filter(s => s.code !== code);
                await syncToCloud();
            }
        };

        // --- 自動抓名字 & 價格 ---
        window.handleCodeInput = async (code) => {
            if(code.length < 4) return;
            try {
                const res = await fetch(`https://corsproxy.io/?https://query2.finance.yahoo.com/v1/finance/search?q=${code}`);
                const data = await res.json();
                const found = data.quotes.find(q => q.symbol.includes(code) && (q.symbol.includes('.TW') || q.symbol.includes('.TWO')));
                if(found) document.getElementById('s-name').value = found.shortname || found.longname;
            } catch (e) {}
        };

        async function fetchPrice(code) {
            const suffixes = ['.TW', '.TWO'];
            for(let s of suffixes) {
                try {
                    const res = await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${code}${s}`);
                    const data = await res.json();
                    if(data.chart.result) {
                        const price = data.chart.result[0].meta.regularMarketPrice;
                        oldPrices[code] = currentPrices[code];
                        currentPrices[code] = price;
                        render(); break;
                    }
                } catch (e) {}
            }
        }

        window.fetchAllPrices = () => {
            const codes = [...new Set(stocks.map(s => s.code))];
            codes.forEach(fetchPrice);
            document.getElementById('last-update').innerText = `更新時間: ${new Date().toLocaleTimeString()}`;
        };

        // --- 介面渲染 ---
        window.switchTab = (tab) => {
            const inv = document.getElementById('page-inv');
            const quo = document.getElementById('page-quo');
            const tInv = document.getElementById('tab-inv-btn');
            const tQuo = document.getElementById('tab-quo-btn');
            if(tab === 'inv') {
                inv.classList.remove('hidden'); quo.classList.add('hidden');
                tInv.classList.add('tab-active'); tQuo.classList.remove('tab-active');
            } else {
                inv.classList.add('hidden'); quo.classList.remove('hidden');
                tInv.classList.remove('tab-active'); tQuo.classList.add('tab-active');
            }
        };

        function render() {
            const invList = document.getElementById('page-inv');
            const quoList = document.getElementById('page-quo');
            if(stocks.length === 0) {
                invList.innerHTML = '<div class="py-20 text-center text-slate-300">📭 尚未建立庫存</div>';
                quoList.innerHTML = ''; return;
            }

            invList.innerHTML = ''; quoList.innerHTML = '';
            const summary = {};
            stocks.forEach(tx => {
                if(!summary[tx.code]) summary[tx.code] = { name: tx.name, shares: 0, cost: 0 };
                summary[tx.code].shares += tx.shares;
                summary[tx.code].cost += tx.totalCost;
            });

            let gMV = 0, gPaid = 0;
            Object.keys(summary).sort().forEach(code => {
                const s = summary[code];
                const price = currentPrices[code] || 0;
                const mv = s.shares * price;
                const profit = mv - s.cost;
                const pct = (s.cost === 0) ? 0 : (profit / s.cost * 100).toFixed(2);
                gMV += mv; gPaid += s.cost;

                const flash = (oldPrices[code] && price > oldPrices[code]) ? "price-up" : (oldPrices[code] && price < oldPrices[code] ? "price-down" : "");

                invList.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border flex justify-between items-center shadow-sm mb-3">
                        <div onclick="openModal('${code}')">
                            <p class="font-black text-lg">${s.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${code} · ${s.shares.toLocaleString()} 股</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black ${profit >= 0 ? 'profit-pos' : 'profit-neg'}">${Math.round(profit).toLocaleString()}</p>
                            <p class="text-[10px] font-bold ${profit >= 0 ? 'profit-pos' : 'profit-neg'}">${pct}%</p>
                        </div>
                        <button onclick="deleteCode('${code}')" class="ml-4 text-slate-200">✕</button>
                    </div>`;

                quoList.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl border flex justify-between items-center shadow-sm ${flash} mb-3">
                        <div><p class="text-xl font-black">${s.name}</p><p class="text-[10px] text-slate-300 font-mono">${code}</p></div>
                        <div class="text-right">
                            <p class="text-2xl font-mono font-black">${price.toFixed(2)}</p>
                        </div>
                    </div>`;
            });

            document.getElementById('total-v').innerText = `NT$ ${Math.round(gMV).toLocaleString()}`;
            const gProfit = gMV - gPaid;
            const pEl = document.getElementById('total-p');
            pEl.innerText = `帳面損益 NT$ ${Math.round(gProfit).toLocaleString()}`;
            pEl.className = `text-xs font-black px-4 py-2 rounded-xl ${gProfit >= 0 ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
        }

        window.openModal = (code) => {
            const m = document.getElementById('modal');
            const c = document.getElementById('modal-content');
            const list = stocks.filter(s => s.code === code);
            document.getElementById('modal-title').innerText = `${list[0].name} 明細`;
            c.innerHTML = list.map(r => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl mb-2">
                    <p class="font-bold text-sm">${r.shares.toLocaleString()} 股 @ ${r.cost}</p>
                    <button onclick="deleteTx(${r.id}); closeModal();" class="text-red-500 font-bold text-xs">刪除</button>
                </div>`).join('');
            m.classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        setInterval(fetchAllPrices, 20000);
    </script>
</head>
<body class="bg-slate-50 text-slate-900 pb-40">

    <div id="auth-page" class="max-w-md mx-auto h-screen flex flex-col justify-center p-8">
        <h1 class="text-4xl font-black text-indigo-600 mb-2 text-center">台股雲端精算</h1>
        <p class="text-slate-400 text-center mb-8">專屬你的即時損益看板</p>
        <div class="space-y-4 bg-white p-8 rounded-[2.5rem] shadow-2xl">
            <input type="email" id="email" placeholder="電子信箱" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="password" id="pass" placeholder="密碼" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="authAction('login')" class="bg-indigo-600 text-white p-4 rounded-2xl font-black">登入</button>
                <button onclick="authAction('reg')" class="bg-slate-200 text-slate-600 p-4 rounded-2xl font-black">註冊</button>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <div class="max-w-md mx-auto p-4 flex justify-between items-center">
            <h1 class="text-xl font-black flex items-center"><span class="live-dot"></span> 雲端監控</h1>
            <button onclick="logout()" class="text-[10px] text-slate-300 font-bold uppercase">登出</button>
        </div>

        <div class="max-w-md mx-auto flex border-b bg-white sticky top-0 z-10">
            <button onclick="switchTab('inv')" id="tab-inv-btn" class="flex-1 py-4 font-black tab-active">帳面損益</button>
            <button onclick="switchTab('quo')" id="tab-quo-btn" class="flex-1 py-4 font-black text-slate-400">即時行情</button>
        </div>

        <div class="max-w-md mx-auto p-4">
            <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl text-white mb-6">
                <p id="last-update" class="text-[9px] text-slate-500 font-mono mb-1 tracking-tighter"></p>
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">投資組合總市值</p>
                <h2 id="total-v" class="text-4xl font-black font-mono tracking-tighter mb-4">NT$ 0</h2>
                <div class="flex gap-2">
                    <span id="total-p" class="text-xs font-black px-4 py-2 rounded-xl bg-white/10">--</span>
                </div>
            </div>

            <div id="page-inv"></div>
            <div id="page-quo" class="hidden"></div>
        </div>

        <div class="fixed bottom-6 left-0 right-0 px-4 z-20">
            <details class="max-w-md mx-auto bg-white rounded-[2rem] shadow-2xl border overflow-hidden">
                <summary class="list-none p-5 text-center font-black text-indigo-600 cursor-pointer">➕ 登錄新成交</summary>
                <div class="p-6 space-y-4 border-t bg-slate-50">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="s-code" oninput="handleCodeInput(this.value)" placeholder="代碼" class="p-4 bg-white border rounded-2xl outline-none">
                        <input type="text" id="s-name" placeholder="名稱" class="p-4 bg-slate-100 rounded-2xl outline-none font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="s-shares" placeholder="股數" class="p-4 bg-white border rounded-2xl outline-none">
                        <input type="number" id="s-cost" placeholder="單價" class="p-4 bg-white border rounded-2xl outline-none">
                    </div>
                    <button onclick="addTransaction()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black">存入雲端庫存</button>
                </div>
            </details>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-8 pb-12">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-2xl font-black"></h3>
                <button onclick="closeModal()" class="text-slate-300 text-3xl">✕</button>
            </div>
            <div id="modal-content" class="no-scrollbar"></div>
        </div>
    </div>
</body>
</html>
