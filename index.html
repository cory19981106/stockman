<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台股精算 Pro - AI 終端版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        :root { --up-color: #f43f5e; --down-color: #10b981; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .up-red { color: var(--up-color); }
        .down-green { color: var(--down-color); }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        .quo-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .truncate-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        summary::-webkit-details-marker { display: none; }
        summary { list-style: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #tv-chart-container { width: 100%; height: 320px; border-radius: 1.5rem; overflow: hidden; background: #f1f5f9; position: relative; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsT-DHIht7TASNmb7GrUzJdAVxIlNNIMw",
            authDomain: "stock-d7721.firebaseapp.com",
            projectId: "stock-d7721",
            storageBucket: "stock-d7721.firebasestorage.app",
            messagingSenderId: "238076969385",
            appId: "1:238076969385:web:10428fe81c77e51b8584b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, stocks = [], watchlist = [], currentPrices = {}, chartInstance = null;
        let editingId = null; // 追蹤編輯狀態

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                await loadUserData();
                startSync();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-page').classList.add('hidden');
            }
        });

        async function loadUserData() {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                stocks = data.stocks || []; watchlist = data.watchlist || [];
            }
            render();
        }

        async function saveUserData() { await setDoc(doc(db, "users", currentUser.uid), { stocks, watchlist }); }

        window.handleCodeInput = async (code, targetId) => {
            if(code.length < 4) return;
            try {
                const res = await fetch(`https://corsproxy.io/?https://query2.finance.yahoo.com/v1/finance/search?q=${code}`);
                const data = await res.json();
                const found = data.quotes.find(q => (q.symbol.includes('.TW') || q.symbol.includes('.TWO')));
                if(found) document.getElementById(targetId).value = found.shortname || found.longname;
            } catch(e) {}
        };

        async function fetchPrice(code) {
            for(let s of ['.TW', '.TWO']) {
                try {
                    const res = await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${code}${s}`);
                    const data = await res.json();
                    if(data.chart.result) {
                        const m = data.chart.result[0].meta;
                        currentPrices[code] = { price: m.regularMarketPrice, prev: m.previousClose, pct: ((m.regularMarketPrice - m.previousClose) / m.previousClose * 100).toFixed(2), market: s };
                        render(); break;
                    }
                } catch(e) {}
            }
        }

        window.fetchAllData = () => {
            const allCodes = [...new Set([...stocks.map(s => s.code), ...watchlist.map(w => w.code)])];
            allCodes.forEach(fetchPrice);
            document.getElementById('update-time').innerText = `Updated: ${new Date().toLocaleTimeString()}`;
        };

        function startSync() { fetchAllData(); setInterval(fetchAllData, 20000); }

        function render() {
            const inv = document.getElementById('p-inv'), quo = document.getElementById('p-quo'), watchListDiv = document.getElementById('p-watch-list');
            inv.innerHTML = ''; quo.innerHTML = ''; watchListDiv.innerHTML = '';

            const sum = {};
            stocks.forEach(s => {
                if(!sum[s.code]) sum[s.code] = { name: s.name, shares: 0, cost: 0, info: currentPrices[s.code] || { price: 0, prev: 0, pct: 0 } };
                sum[s.code].shares += s.shares; sum[s.code].cost += (s.shares * s.cost);
            });

            let gV = 0, gP = 0, gPaid = 0;
            Object.keys(sum).sort().forEach(code => {
                const s = sum[code];
                const profit = (s.shares * s.info.price) - s.cost;
                const isUp = s.info.price >= s.info.prev;
                gV += (s.shares * s.info.price); gPaid += s.cost; gP += profit;

                inv.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl mb-3 border border-slate-100 card-shadow flex justify-between items-center active:scale-[0.98] transition-all" onclick="openStockDetails('${code}')">
                        <div class="flex-1 min-w-0">
                            <p class="font-extrabold text-slate-800 text-lg truncate-name">${s.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${code} · ${s.shares.toLocaleString()} 股</p>
                        </div>
                        <div class="text-right">
                            <p class="${profit >= 0 ? 'up-red' : 'down-green'} text-lg font-extrabold font-mono">${profit > 0 ? '+' : ''}${Math.round(profit).toLocaleString()}</p>
                            <p class="text-[10px] font-bold text-slate-300">DETAILS ❯</p>
                        </div>
                    </div>`;

                quo.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl border border-slate-50 card-shadow" onclick="openStockDetails('${code}')">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black px-1.5 py-0.5 bg-slate-100 rounded text-slate-500">${code}</span>
                            <span class="text-[10px] font-bold ${isUp ? 'up-red' : 'down-green'}">${isUp?'▲':'▼'}${Math.abs(s.info.pct)}%</span>
                        </div>
                        <p class="text-xs font-bold text-slate-400 truncate-name mb-1">${s.name}</p>
                        <p class="text-xl font-extrabold font-mono ${isUp ? 'up-red' : 'down-green'}">${s.info.price.toFixed(2)}</p>
                    </div>`;
            });

            watchlist.forEach(w => {
                const info = currentPrices[w.code] || { price: 0, prev: 0, pct: 0 };
                const isUp = info.price >= info.prev;
                watchListDiv.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border border-slate-50 card-shadow flex justify-between items-center mb-3 active:scale-[0.98] transition-all" onclick="openStockDetails('${w.code}')">
                        <div class="flex-1">
                            <p class="font-extrabold text-slate-800 text-base truncate-name">${w.name}</p>
                            <p class="text-[11px] text-slate-400 font-bold tracking-wider">${w.code}</p>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <div>
                                <p class="${isUp ? 'up-red' : 'down-green'} text-lg font-extrabold font-mono">${info.price.toFixed(2)}</p>
                                <p class="${isUp ? 'up-red' : 'down-green'} text-[10px] font-bold">${isUp?'▲':'▼'}${Math.abs(info.pct)}%</p>
                            </div>
                            <button onclick="event.stopPropagation(); removeFromWatchlist('${w.code}')" class="text-slate-200 hover:text-red-500 transition-colors">✕</button>
                        </div>
                    </div>`;
            });
            
            document.getElementById('total-v').innerText = `NT$ ${Math.round(gV).toLocaleString()}`;
            document.getElementById('total-p').innerText = `${gP >= 0 ? '+' : ''}${Math.round(gP).toLocaleString()} (${gPaid > 0 ? ((gP/gPaid)*100).toFixed(2) : '0.00'}%)`;
            document.getElementById('total-p').className = `text-sm font-extrabold mt-1 px-3 py-1 rounded-full inline-block ${gP >= 0 ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-500'}`;
            updateChart(sum);
        }

        function getTVTicker(code) {
            const info = currentPrices[code];
            if (!info) return `TWSE:${code}`;
            return info.market === '.TWO' ? `OTC:${code}` : `TWSE:${code}`;
        }

        window.openStockDetails = (code) => {
            const info = currentPrices[code];
            const name = watchlist.find(w => w.code === code)?.name || stocks.find(s => s.code === code)?.name || code;
            document.getElementById('modal-title').innerText = `${name} (${code})`;
            
            // 載入 TradingView 進階圖表
            const container = document.getElementById('tv-chart-container');
            container.innerHTML = `<div id="tv-advanced-widget" style="height:100%; width:100%;"></div>`;
            new TradingView.widget({
                "autosize": true,
                "symbol": getTVTicker(code),
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "light",
                "style": "1",
                "locale": "zh_TW",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "hide_legend": true,
                "save_image": false,
                "container_id": "tv-advanced-widget"
            });

            document.getElementById('modal-actions').innerHTML = `
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <a href="https://tw.stock.yahoo.com/quote/${code}" target="_blank" class="bg-slate-100 text-slate-700 p-3 rounded-2xl text-center text-xs font-black">Yahoo 財經</a>
                    <a href="https://www.wantgoo.com/stock/${code}" target="_blank" class="bg-slate-100 text-slate-700 p-3 rounded-2xl text-center text-xs font-black">玩股網分析</a>
                </div>
                <button onclick="copyAICmd('${code}', '${name}')" class="w-full bg-indigo-50 text-indigo-600 p-4 rounded-2xl text-sm font-extrabold mb-4 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span>✨</span> 複製 AI 診斷指令 (貼給 Gemini)
                </button>
                <div class="space-y-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">交易紀錄</p>
                    ${stocks.filter(s => s.code === code).map(r => `
                        <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                            <p class="text-xs font-bold text-slate-600">${r.shares.toLocaleString()} 股 @ ${r.cost}</p>
                            <div class="flex gap-2">
                                <button onclick="editTx(${r.id})" class="text-[10px] bg-indigo-100 text-indigo-500 px-3 py-1.5 rounded-full font-black">修改</button>
                                <button onclick="deleteTx(${r.id})" class="text-[10px] bg-red-100 text-red-500 px-3 py-1.5 rounded-full font-black">刪除</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.editTx = (id) => {
            const tx = stocks.find(s => s.id === id);
            if (!tx) return;
            closeModal();
            switchTab('inv');
            document.getElementById('add-details').open = true;
            document.getElementById('s-code').value = tx.code;
            document.getElementById('s-name').value = tx.name;
            document.getElementById('s-shares').value = tx.shares;
            document.getElementById('s-cost').value = tx.cost;
            editingId = id;
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerText = "更新持股紀錄";
            saveBtn.classList.replace('bg-indigo-600', 'bg-orange-500');
        };

        window.saveTransaction = async () => {
            const code = document.getElementById('s-code').value.trim(), name = document.getElementById('s-name').value.trim(), shares = parseFloat(document.getElementById('s-shares').value), cost = parseFloat(document.getElementById('s-cost').value);
            if(code && shares && cost) {
                if (editingId) {
                    const idx = stocks.findIndex(s => s.id === editingId);
                    stocks[idx] = { ...stocks[idx], code, name: name || code, shares, cost };
                    editingId = null;
                    const saveBtn = document.getElementById('save-btn');
                    saveBtn.innerText = "存入雲端資產";
                    saveBtn.classList.replace('bg-orange-500', 'bg-indigo-600');
                } else {
                    stocks.push({ id: Date.now(), code, name: name || code, shares, cost });
                }
                await saveUserData(); resetForm(); fetchAllData();
            }
        };

        window.copyAICmd = (code, name) => {
            const cmd = `請幫我分析台股股票「${name} (${code})」。請從最近的營收趨勢、市場競爭力、以及目前技術面（K線）給出專業診斷建議。`;
            navigator.clipboard.writeText(cmd).then(() => alert('指令已複製！請直接貼給 Gemini 機器人進行分析。'));
        };

        window.addToWatchlist = async () => {
            const code = document.getElementById('w-code').value.trim(), name = document.getElementById('w-name').value.trim();
            if(code) { watchlist.push({ code, name: name || code }); await saveUserData(); document.getElementById('w-code').value = ''; document.getElementById('w-name').value = ''; fetchAllData(); }
        };

        window.removeFromWatchlist = async (code) => { watchlist = watchlist.filter(x => x.code !== code); await saveUserData(); render(); };

        function updateChart(sum) {
            const ctx = document.getElementById('assetChart'), listContainer = document.getElementById('ana-list');
            if(chartInstance) chartInstance.destroy();
            const colors = ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
            const entries = Object.entries(sum).map(([code, s]) => ({ code, name: s.name, value: s.shares * s.info.price })).sort((a, b) => b.value - a.value);
            const totalValue = entries.reduce((a, b) => a + b.value, 0);
            if(totalValue === 0) { listContainer.innerHTML = '<p class="text-center text-slate-400 py-10">尚無數據</p>'; return; }
            chartInstance = new Chart(ctx, {
                type: 'doughnut', data: { labels: entries.map(e => e.name), datasets: [{ data: entries.map(e => e.value), backgroundColor: colors, borderWidth: 0 }] },
                options: { plugins: { legend: { display: false } }, cutout: '80%', maintainAspectRatio: false }
            });
            listContainer.innerHTML = entries.map((e, i) => `<div class="flex justify-between items-center p-2"><div class="flex items-center gap-3 overflow-hidden"><div class="w-2 h-2 rounded-full" style="background-color: ${colors[i % colors.length]}"></div><span class="text-sm font-bold text-slate-700 truncate">${e.name}</span></div><div class="text-right"><p class="text-sm font-mono font-extrabold text-slate-700">NT$ ${Math.round(e.value).toLocaleString()}</p></div></div>`).join('');
        }

        window.deleteTx = async (id) => { if(confirm('刪除交易？')) { stocks = stocks.filter(s => s.id !== id); await saveUserData(); render(); closeModal(); } };

        window.switchTab = (tab) => {
            ['p-inv', 'p-quo', 'p-watch', 'p-ana'].forEach(p => document.getElementById(p).classList.add('hidden'));
            const activePage = document.getElementById(`p-${tab}`);
            if (tab === 'quo') activePage.classList.add('quo-grid');
            activePage.classList.remove('hidden');
            document.getElementById('floating-add-area').classList.toggle('hidden', tab !== 'inv');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-400'));
            event.currentTarget.classList.replace('text-slate-400', 'text-indigo-600');
        };
        
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.logout = () => signOut(auth);
        window.resetForm = () => { 
            document.getElementById('s-code').value=''; document.getElementById('s-name').value=''; document.getElementById('s-shares').value=''; document.getElementById('s-cost').value=''; 
            document.getElementById('add-details').open = false; 
            editingId = null;
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerText = "存入雲端資產";
            saveBtn.classList.replace('bg-orange-500', 'bg-indigo-600');
        };
        window.authAction = async () => {
            const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("登入失敗"); }
        };
    </script>
</head>
<body class="pb-32 bg-slate-50">

    <div id="auth-page" class="flex flex-col items-center justify-center min-h-screen p-8 bg-slate-900">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-white text-3xl font-extrabold mb-1">台股精算 <span class="text-indigo-500">Pro</span></h1>
            <p class="text-slate-500 text-[10px] mb-10 font-black tracking-widest uppercase">Intelligent Terminal</p>
            <div class="space-y-3">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-800 text-white outline-none text-sm">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-800 text-white outline-none text-sm">
                <button onclick="authAction()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-extrabold active:scale-95 transition-all">進入系統</button>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <header class="px-6 pt-10 pb-6 sticky top-0 bg-slate-50/80 backdrop-blur-md z-30">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <p class="text-slate-400 text-[10px] font-black tracking-widest mb-1 uppercase">Portfolio Value</p>
                    <h2 id="total-v" class="text-3xl font-extrabold text-slate-900 tracking-tighter tabular-nums leading-none">NT$ 0</h2>
                    <div id="total-p">--</div>
                </div>
                <button onclick="logout()" class="w-10 h-10 rounded-2xl bg-white shadow-sm border border-slate-100 flex items-center justify-center">🚪</button>
            </div>
            <nav class="flex justify-between glass-nav p-1 rounded-2xl border border-slate-200 shadow-sm">
                <button onclick="switchTab('inv')" class="tab-btn flex-1 py-2.5 rounded-xl text-xs font-black text-indigo-600 transition-all">持股</button>
                <button onclick="switchTab('quo')" class="tab-btn flex-1 py-2.5 rounded-xl text-xs font-black text-slate-400 transition-all">行情</button>
                <button onclick="switchTab('watch')" class="tab-btn flex-1 py-2.5 rounded-xl text-xs font-black text-slate-400 transition-all">自選</button>
                <button onclick="switchTab('ana')" class="tab-btn flex-1 py-2.5 rounded-xl text-xs font-black text-slate-400 transition-all">分析</button>
            </nav>
        </header>

        <main class="px-6">
            <div id="p-inv"></div>
            <div id="p-quo" class="hidden"></div>
            <div id="p-watch" class="hidden">
                <div class="bg-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-xl">
                    <p class="text-slate-500 text-[10px] font-black uppercase mb-4 tracking-widest">Quick Add Watchlist</p>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <input type="text" id="w-code" oninput="handleCodeInput(this.value, 'w-name')" placeholder="Code" class="p-4 rounded-2xl text-sm bg-slate-800 text-white outline-none border-none">
                        <input type="text" id="w-name" placeholder="Name" class="p-4 rounded-2xl text-sm bg-slate-800 text-white outline-none border-none font-bold">
                    </div>
                    <button onclick="addToWatchlist()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-extrabold text-xs shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">＋ 加入自選清單</button>
                </div>
                <div id="p-watch-list"></div>
            </div>
            <div id="p-ana" class="hidden">
                <div class="bg-white p-8 rounded-[3rem] card-shadow">
                    <div class="relative w-44 h-44 mx-auto mb-10"><canvas id="assetChart"></canvas></div>
                    <div id="ana-list" class="space-y-1"></div>
                </div>
            </div>
            <p id="update-time" class="text-center text-[9px] text-slate-300 font-bold mt-10 tracking-[0.2em] uppercase"></p>
        </main>

        <div id="floating-add-area" class="fixed bottom-8 left-0 right-0 px-6 z-40">
            <details id="add-details" class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
                <summary class="p-5 text-center font-extrabold text-indigo-600 cursor-pointer active:bg-slate-50">＋ 新增/修改庫存紀錄</summary>
                <div class="p-8 space-y-5 bg-white border-t border-slate-50">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="s-code" oninput="handleCodeInput(this.value, 's-name')" placeholder="股票代碼" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm border-none">
                        <input type="text" id="s-name" placeholder="股票名稱" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm font-bold border-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="s-shares" placeholder="買入股數" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm border-none">
                        <input type="number" id="s-cost" placeholder="買入成本" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm border-none">
                    </div>
                    <div class="flex gap-3">
                        <button onclick="resetForm()" class="flex-1 bg-slate-100 text-slate-500 p-4 rounded-2xl font-extrabold text-sm active:scale-95 transition-all">取消</button>
                        <button id="save-btn" onclick="saveTransaction()" class="flex-[2] bg-indigo-600 text-white p-4 rounded-2xl font-extrabold text-sm active:scale-95 transition-all shadow-lg shadow-indigo-500/20">存入雲端資產</button>
                    </div>
                </div>
            </details>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-extrabold text-slate-900"></h3>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center">✕</button>
            </div>
            
            <div id="tv-chart-container" class="mb-6"></div>
