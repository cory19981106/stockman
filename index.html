<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台股實時監控 - 修正版</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .up-red { color: #ef4444; font-weight: 900; }
        .down-green { color: #22c55e; font-weight: 900; }
        @keyframes flash-up { from { background-color: rgba(239, 68, 68, 0.2); } to { background-color: transparent; } }
        @keyframes flash-down { from { background-color: rgba(34, 197, 94, 0.2); } to { background-color: transparent; } }
        .price-up { animation: flash-up 1.2s ease-out; }
        .price-down { animation: flash-down 1.2s ease-out; }
        .live-dot { width: 8px; height: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: blink 1s infinite; margin-right: 6px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .tab-active { color: #4f46e5; border-bottom: 4px solid #4f46e5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media (min-width: 768px) { .stock-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; } }
        @media (min-width: 1280px) { .stock-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDsT-DHIht7TASNmb7GrUzJdAVxIlNNIMw",
            authDomain: "stock-d7721.firebaseapp.com",
            projectId: "stock-d7721",
            storageBucket: "stock-d7721.firebasestorage.app",
            messagingSenderId: "238076969385",
            appId: "1:238076969385:web:10428fe81c77e51b8584b8",
            measurementId: "G-9RE7BBEH6M"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let stocks = [];
        let currentPrices = {};
        let oldPrices = {};
        let nightInfo = { tx: { price: 0, pct: 0, change: 0 } };
        let editingId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                await loadStocks();
                startSync();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-page').classList.add('hidden');
            }
        });

        async function loadStocks() {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (docSnap.exists()) stocks = docSnap.data().stocks || [];
            render();
        }

        // --- 修正：自動優先抓取中文名字與正確代碼後綴 ---
        window.handleCodeInput = async (code) => {
            if(code.length < 4) return;
            try {
                const res = await fetch(`https://corsproxy.io/?https://query2.finance.yahoo.com/v1/finance/search?q=${code}`);
                const data = await res.json();
                // 優先找台股後綴
                const found = data.quotes.find(q => q.symbol.includes(code) && (q.symbol.includes('.TW') || q.symbol.includes('.TWO')));
                if(found) {
                    document.getElementById('s-name').value = found.shortname || found.longname;
                    // 紀錄該股票在 Yahoo 系統中的正確後綴 (TW 或 TWO)
                    document.getElementById('s-code').dataset.suffix = found.symbol.split('.')[1];
                }
            } catch (e) {}
        };

        // --- 修正：解決長代碼 009816 抓不到價格導致計算錯誤的問題 ---
        async function fetchPrice(code) {
            // 嘗試邏輯：如果資料庫有存過後綴就用它，沒有就先試 .TW 再試 .TWO
            const suffixes = ['.TW', '.TWO'];
            let success = false;

            for(let s of suffixes) {
                try {
                    const res = await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${code}${s}`);
                    const data = await res.json();
                    if(data.chart.result && data.chart.result[0].meta.regularMarketPrice !== undefined) {
                        const meta = data.chart.result[0].meta;
                        const price = meta.regularMarketPrice;
                        oldPrices[code] = currentPrices[code]?.price || price;
                        currentPrices[code] = { 
                            price: price || 0, 
                            prev: meta.previousClose || price, 
                            pct: meta.previousClose ? ((price - meta.previousClose) / meta.previousClose * 100).toFixed(2) : "0.00"
                        };
                        success = true;
                        render();
                        break; // 抓到就跳出迴圈
                    }
                } catch (e) {}
            }
            
            // 如果所有後綴都失敗，給予預設值防止計算錯誤
            if(!success && !currentPrices[code]) {
                currentPrices[code] = { price: 0, prev: 0, pct: "0.00" };
                render();
            }
        }

        async function fetchNightIndex() {
            try {
                const res = await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/TXF=F`);
                const data = await res.json();
                const meta = data.chart.result[0].meta;
                const price = meta.regularMarketPrice;
                nightInfo.tx = { 
                    price, 
                    change: (price - meta.previousClose).toFixed(0), 
                    pct: ((price - meta.previousClose) / meta.previousClose * 100).toFixed(2) 
                };
                render();
            } catch (e) {}
        }

        window.saveTransaction = async () => {
            const code = document.getElementById('s-code').value.trim();
            const name = document.getElementById('s-name').value.trim();
            const shares = parseFloat(document.getElementById('s-shares').value);
            const cost = parseFloat(document.getElementById('s-cost').value);
            if(code && !isNaN(shares) && !isNaN(cost)) {
                if (editingId) {
                    const idx = stocks.findIndex(s => s.id === editingId);
                    if (idx !== -1) stocks[idx] = { ...stocks[idx], code, name: name || code, shares, cost };
                    editingId = null;
                } else {
                    stocks.push({ id: Date.now(), code, name: name || code, shares, cost });
                }
                await setDoc(doc(db, "users", currentUser.uid), { stocks });
                resetForm();
                fetchAllData();
            }
        };

        window.fetchAllData = () => {
            const codes = [...new Set(stocks.map(s => s.code))];
            codes.forEach(fetchPrice);
            fetchNightIndex();
            document.getElementById('update-time').innerText = `同步: ${new Date().toLocaleTimeString()}`;
        };

        function startSync() { fetchAllData(); setInterval(fetchAllData, 15000); }

        function render() {
            const inv = document.getElementById('p-inv');
            const quo = document.getElementById('p-quo');
            const night = document.getElementById('p-night-box');
            inv.innerHTML = ''; quo.innerHTML = '';

            const summary = {};
            stocks.forEach(s => {
                const info = currentPrices[s.code] || { price: 0, pct: 0, prev: 0 };
                if(!summary[s.code]) summary[s.code] = { name: s.name, shares: 0, cost: 0, info };
                summary[s.code].shares += s.shares;
                summary[s.code].cost += (s.shares * s.cost);
            });

            let gVal = 0;
            Object.keys(summary).sort().forEach(code => {
                const s = summary[code];
                const price = s.info.price || 0;
                const profit = (s.shares * price) - s.cost;
                const isUp = price >= s.info.prev;
                const flash = (oldPrices[code] < price) ? "price-up" : (oldPrices[code] > price ? "price-down" : "");
                
                gVal += (s.shares * price);

                inv.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm hover:shadow-md transition cursor-pointer" onclick="openModal('${code}')">
                        <div><p class="font-black text-xl text-slate-900">${s.name}</p><p class="text-xs text-slate-400 font-bold uppercase">${code} · ${s.shares.toLocaleString()} 股</p></div>
                        <div class="text-right"><p class="text-lg ${profit >= 0 ? 'up-red' : 'down-green'}">${Math.round(profit).toLocaleString()}</p></div>
                    </div>`;

                quo.innerHTML += `
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 flex justify-between items-center shadow-sm ${flash}">
                        <div><p class="text-2xl font-black text-slate-900">${s.name}</p><p class="text-xs text-slate-300 font-mono">${code}</p></div>
                        <div class="text-right">
                            <p class="text-3xl font-mono font-black ${isUp ? 'up-red' : 'down-green'}">${price.toFixed(2)}</p>
                            <p class="text-sm font-bold ${isUp ? 'up-red' : 'down-green'}">${isUp ? '▲' : '▼'} ${s.info.pct}%</p>
                        </div>
                    </div>`;
            });

            night.innerHTML = `
                <div class="bg-slate-900 p-10 rounded-[3rem] text-center shadow-2xl border border-indigo-500/30">
                    <p class="text-indigo-400 font-bold mb-4 tracking-widest text-sm uppercase">台指期實時夜盤</p>
                    <h3 class="text-6xl font-black font-mono mb-4 ${nightInfo.tx.pct >= 0 ? 'up-red' : 'down-green'}">${nightInfo.tx.price}</h3>
                    <div class="flex justify-center gap-6">
                        <span class="text-xl font-bold ${nightInfo.tx.pct >= 0 ? 'up-red' : 'down-green'}">${nightInfo.tx.change >= 0 ? '+' : ''}${nightInfo.tx.change}</span>
                        <span class="text-xl font-bold ${nightInfo.tx.pct >= 0 ? 'up-red' : 'down-green'}">${nightInfo.tx.pct}%</span>
                    </div>
                </div>`;
            
            document.getElementById('total-v').innerText = `NT$ ${Math.round(gVal).toLocaleString()}`;
        }

        window.openModal = (code) => {
            const m = document.getElementById('modal');
            const c = document.getElementById('modal-content');
            const list = stocks.filter(s => s.code === code);
            document.getElementById('modal-title').innerText = `${list[0].name} 明細`;
            c.innerHTML = list.map(r => `
                <div class="flex justify-between items-center p-5 bg-slate-50 rounded-2xl mb-3 border">
                    <p class="font-bold text-base">${r.shares.toLocaleString()} 股 @ ${r.cost}</p>
                    <div class="flex gap-2">
                        <button onclick="fillEditForm(${r.id})" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold">編輯</button>
                        <button onclick="deleteTx(${r.id})" class="bg-red-500 text-white px-4 py-2 rounded-xl text-xs font-bold">刪除</button>
                    </div>
                </div>`).join('');
            m.classList.remove('hidden');
        };

        window.fillEditForm = (id) => {
            const s = stocks.find(item => item.id === id);
            editingId = id;
            document.getElementById('s-code').value = s.code;
            document.getElementById('s-name').value = s.name;
            document.getElementById('s-shares').value = s.shares;
            document.getElementById('s-cost').value = s.cost;
            document.getElementById('submit-btn').innerText = "更新紀錄";
            document.querySelector('details').open = true;
            document.getElementById('modal').classList.add('hidden');
        };

        window.deleteTx = async (id) => {
            if(confirm('確認刪除？')) { stocks = stocks.filter(s => s.id !== id); await setDoc(doc(db, "users", currentUser.uid), { stocks }); render(); document.getElementById('modal').classList.add('hidden'); }
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.switchTab = (tab) => {
            ['p-inv', 'p-quo', 'p-night'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(`p-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            event.target.classList.add('tab-active');
        };
        window.authAction = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if(type === 'reg') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) { alert("登入出錯: " + e.message); }
        };
        window.logout = () => signOut(auth);
        window.resetForm = () => { editingId = null; document.getElementById('s-code').value = ''; document.getElementById('s-name').value = ''; document.getElementById('s-shares').value = ''; document.getElementById('s-cost').value = ''; document.getElementById('submit-btn').innerText = "確認加入雲端"; document.querySelector('details').open = false; };
    </script>
</head>
<body class="bg-slate-50 text-slate-900 pb-40 min-h-screen">

    <div id="auth-page" class="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-900">
        <div class="w-full max-w-md bg-slate-800 p-10 rounded-[3rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-indigo-500 mb-2">台股精算 Pro</h1>
            <div class="space-y-4 mt-8">
                <input type="email" id="email" placeholder="信箱帳號" class="w-full p-4 bg-slate-700 text-white rounded-2xl outline-none border border-slate-600">
                <input type="password" id="pass" placeholder="密碼" class="w-full p-4 bg-slate-700 text-white rounded-2xl outline-none border border-slate-600">
                <button onclick="authAction('login')" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black text-lg">進入系統</button>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="py-6 flex justify-between items-center border-b">
            <div class="flex items-center"><span class="live-dot"></span><span class="text-sm font-bold text-slate-400 uppercase tracking-widest">Live Connect</span></div>
            <div class="flex items-center gap-4">
                <span id="update-time" class="hidden sm:block text-[10px] text-slate-300 font-mono"></span>
                <button onclick="logout()" class="text-xs text-slate-400 font-bold border px-3 py-1 rounded-lg">登出</button>
            </div>
        </div>

        <div class="flex border-b bg-white sticky top-0 z-10 shadow-sm mb-6 rounded-b-2xl overflow-hidden">
            <button onclick="switchTab('inv')" class="tab-btn flex-1 py-5 font-black tab-active text-lg">資產損益</button>
            <button onclick="switchTab('quo')" class="tab-btn flex-1 py-5 font-black text-slate-400 text-lg">即時行情</button>
            <button onclick="switchTab('night')" class="tab-btn flex-1 py-5 font-black text-slate-400 text-lg">台指期夜盤</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4">
                <div class="bg-indigo-600 p-10 rounded-[3rem] shadow-xl text-white text-center mb-6 lg:sticky lg:top-32">
                    <p class="text-indigo-200 text-xs font-bold uppercase mb-2 tracking-widest tracking-widest">Total Market Value</p>
                    <h2 id="total-v" class="text-4xl font-black font-mono tracking-tighter">NT$ 0</h2>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="p-inv" class="stock-grid"></div>
                <div id="p-quo" class="hidden stock-grid"></div>
                <div id="p-night" class="hidden">
                    <div id="p-night-box"></div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-10 left-0 right-0 px-4 z-20 flex justify-center">
            <details class="w-full max-w-2xl bg-white rounded-[2.5rem] shadow-2xl border overflow-hidden">
                <summary class="list-none p-6 text-center font-black text-indigo-600 cursor-pointer hover:bg-slate-50 transition text-lg">➕ 快速新增或修改庫存</summary>
                <div class="p-8 space-y-5 border-t bg-slate-50">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <input type="text" id="s-code" oninput="handleCodeInput(this.value)" placeholder="代碼 (如 2330)" class="p-5 bg-white border rounded-2xl outline-none">
                        <input type="text" id="s-name" placeholder="股票名稱" class="p-5 bg-white border rounded-2xl outline-none font-bold">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <input type="number" id="s-shares" placeholder="股數" class="p-5 bg-white border rounded-2xl outline-none">
                        <input type="number" id="s-cost" placeholder="成本" class="p-5 bg-white border rounded-2xl outline-none">
                    </div>
                    <button id="submit-btn" onclick="saveTransaction()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black text-lg">確認存入雲端</button>
                </div>
            </details>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modal-title" class="text-2xl font-black text-slate-900"></h3>
                <button onclick="closeModal()" class="text-slate-300 text-4xl">✕</button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>
</body>
</html>
