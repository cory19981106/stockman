<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台股雲端精算 Pro - 終極版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        
        .up-red { color: #f43f5e; }
        .down-green { color: #10b981; }
        
        /* 滾動條隱藏 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 行情卡片：手機一排兩個，確保不跑版 */
        .quo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        /* 核心修復：名稱長度限制 */
        .truncate-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
        .quo-card { min-width: 0; }

        /* 大盤動畫 */
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); } }
        .live-pulse { animation: pulse-red 2s infinite; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const FEE_RATE = 0.001425, DISCOUNT = 0.6, MIN_FEE = 20; 
        const TAX_ETF = 0.001, TAX_STOCK = 0.003;

        const firebaseConfig = {
            apiKey: "AIzaSyDsT-DHIht7TASNmb7GrUzJdAVxIlNNIMw",
            authDomain: "stock-d7721.firebaseapp.com",
            projectId: "stock-d7721",
            storageBucket: "stock-d7721.firebasestorage.app",
            messagingSenderId: "238076969385",
            appId: "1:238076969385:web:10428fe81c77e51b8584b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, stocks = [], currentPrices = {}, nightInfo = { tx: { price: 0, pct: 0, change: 0 } }, marketIndex = { price: 0, change: 0, pct: 0 };
        let chartInstance = null, editingId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                await loadStocks();
                startSync();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-page').classList.add('hidden');
            }
        });

        async function loadStocks() {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (docSnap.exists()) stocks = docSnap.data().stocks || [];
            render();
        }

        // 精算賣出所得與損益
        function getNet(shares, cost, nowPrice, code) {
            const isETF = code.startsWith('00') || code.startsWith('01');
            const tax = isETF ? TAX_ETF : TAX_STOCK;
            const buyVal = shares * cost, sellVal = shares * nowPrice;
            const f1 = Math.max(MIN_FEE, Math.floor(buyVal * FEE_RATE * DISCOUNT));
            const f2 = Math.max(MIN_FEE, Math.floor(sellVal * FEE_RATE * DISCOUNT));
            const t = Math.floor(sellVal * tax);
            const profit = sellVal - buyVal - f1 - f2 - t;
            return { profit: Math.round(profit), pct: ((profit / (buyVal + f1)) * 100).toFixed(2), cash: Math.round(sellVal - f2 - t) };
        }

        // 抓取大盤指數
        async function fetchMarketIndex() {
            try {
                const res = await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/^TWII`);
                const d = await res.json();
                const m = d.chart.result[0].meta;
                marketIndex = { price: m.regularMarketPrice, change: (m.regularMarketPrice - m.previousClose).toFixed(2), pct: ((m.regularMarketPrice - m.previousClose) / m.previousClose * 100).toFixed(2) };
                render();
            } catch(e) { console.log("大盤數據異常"); }
        }

        async function fetchPrice(code) {
            for(let s of ['.TW', '.TWO']) {
                try {
                    const res = await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${code}${s}`);
                    const data = await res.json();
                    if(data.chart.result) {
                        const m = data.chart.result[0].meta;
                        currentPrices[code] = { price: m.regularMarketPrice, prev: m.previousClose, pct: ((m.regularMarketPrice - m.previousClose) / m.previousClose * 100).toFixed(2) };
                        render(); break;
                    }
                } catch(e) {}
            }
        }

        function startSync() { 
            const sync = () => {
                [...new Set(stocks.map(s => s.code))].forEach(fetchPrice);
                fetchMarketIndex();
                document.getElementById('update-time').innerText = `Updated: ${new Date().toLocaleTimeString()}`;
            };
            sync(); setInterval(sync, 15000);
        }

        function render() {
            const inv = document.getElementById('p-inv'), quo = document.getElementById('p-quo');
            inv.innerHTML = ''; quo.innerHTML = '';

            // 更新大盤顯示
            const idxEl = document.getElementById('market-idx-box');
            if (idxEl) {
                const isUp = marketIndex.change >= 0;
                idxEl.innerHTML = `
                    <div class="text-center"><p class="text-2xl font-black ${isUp?'up-red':'down-green'}">${Math.round(marketIndex.price).toLocaleString()}</p><p class="text-[9px] text-slate-400 font-bold">加權指數 ${isUp?'+':''}${marketIndex.change}</p></div>
                    <div class="text-center"><p class="text-2xl font-black text-slate-800">${marketIndex.pct}%</p><p class="text-[9px] text-slate-400 font-bold">當日漲跌幅</p></div>
                `;
            }

            const sum = {};
            stocks.forEach(s => {
                if(!sum[s.code]) sum[s.code] = { name: s.name, shares: 0, cost: 0, info: currentPrices[s.code] || { price: 0, prev: 0, pct: 0 } };
                sum[s.code].shares += s.shares;
                sum[s.code].cost += (s.shares * s.cost);
            });

            let gV = 0, gP = 0, gPaid = 0;
            Object.keys(sum).sort().forEach(code => {
                const s = sum[code];
                const res = getNet(s.shares, s.cost/s.shares, s.info.price, code);
                const isUp = s.info.price >= s.info.prev;
                gV += res.cash; gPaid += s.cost; gP += res.profit;

                inv.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center mb-3 shadow-sm active:scale-95 transition" onclick="openModal('${code}')">
                        <div class="flex-1 overflow-hidden mr-4 min-w-0">
                            <p class="font-black text-slate-800 text-base truncate-name">${s.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${code} · ${s.shares.toLocaleString()} 股</p>
                        </div>
                        <div class="text-right">
                            <p class="${res.profit >= 0 ? 'up-red' : 'down-green'} text-lg font-black">${res.profit > 0 ? '+' : ''}${res.profit.toLocaleString()}</p>
                            <p class="text-[10px] text-slate-400 font-bold">回收: ${res.cash.toLocaleString()}</p>
                        </div>
                    </div>`;

                quo.innerHTML += `
                    <div class="quo-card bg-white p-4 rounded-2xl border border-slate-100 flex flex-col shadow-sm min-w-0" onclick="alert('${s.name}')">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black px-1.5 py-0.5 bg-slate-50 rounded text-slate-400">${code}</span>
                            <span class="text-[10px] font-bold ${isUp ? 'up-red' : 'down-green'}">${isUp?'▲':'▼'}${Math.abs(s.info.pct)}%</span>
                        </div>
                        <div class="min-w-0"><p class="text-[13px] font-bold text-slate-700 truncate-name mb-1">${s.name}</p></div>
                        <p class="text-xl font-black font-mono tracking-tighter ${isUp ? 'up-red' : 'down-green'}">${s.info.price.toFixed(2)}</p>
                    </div>`;
            });

            document.getElementById('total-v').innerText = `NT$ ${Math.round(gV).toLocaleString()}`;
            document.getElementById('total-p').innerText = `預估損益 NT$ ${Math.round(gP).toLocaleString()} (${((gP/gPaid)*100).toFixed(2)}%)`;
            document.getElementById('total-p').className = `text-[11px] font-black px-4 py-1.5 rounded-full ${gP >= 0 ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-500'}`;
        }

        // 修改與存入功能
        window.saveTransaction = async () => {
            const code = document.getElementById('s-code').value.trim();
            const name = document.getElementById('s-name').value.trim();
            const shares = parseFloat(document.getElementById('s-shares').value);
            const cost = parseFloat(document.getElementById('s-cost').value);
            
            if(code && shares && cost) {
                if(editingId) {
                    const idx = stocks.findIndex(s => s.id === editingId);
                    stocks[idx] = { ...stocks[idx], code, name: name || code, shares, cost };
                    editingId = null;
                    document.getElementById('btn-save').innerText = "存入雲端數據";
                } else {
                    stocks.push({ id: Date.now(), code, name: name || code, shares, cost });
                }
                await setDoc(doc(db, "users", currentUser.uid), { stocks });
                resetForm(); render();
            }
        };

        window.editTx = (id) => {
            const r = stocks.find(s => s.id === id);
            document.getElementById('s-code').value = r.code;
            document.getElementById('s-name').value = r.name;
            document.getElementById('s-shares').value = r.shares;
            document.getElementById('s-cost').value = r.cost;
            editingId = id;
            document.getElementById('btn-save').innerText = "更新此筆紀錄";
            document.querySelector('details').open = true;
            closeModal();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        };

        window.deleteTx = async (id) => {
            if(confirm('刪除此筆交易？')) { stocks = stocks.filter(s => s.id !== id); await setDoc(doc(db, "users", currentUser.uid), { stocks }); render(); closeModal(); }
        };

        window.openModal = (code) => {
            const m = document.getElementById('modal'), c = document.getElementById('modal-content');
            const list = stocks.filter(s => s.code === code);
            document.getElementById('modal-title').innerText = list[0].name;
            c.innerHTML = list.map(r => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl mb-2">
                    <div class="min-w-0">
                        <p class="text-sm font-bold text-slate-600">${r.shares.toLocaleString()} 股 @ ${r.cost}</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="editTx(${r.id})" class="text-xs text-indigo-500 font-black">修改</button>
                        <button onclick="deleteTx(${r.id})" class="text-xs text-red-400 font-bold">刪除</button>
                    </div>
                </div>`).join('');
            m.classList.remove('hidden');
        };

        window.switchTab = (tab) => {
            ['p-inv', 'p-quo', 'p-night', 'p-ana'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(`p-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-400'));
            event.currentTarget.classList.replace('text-slate-400', 'text-indigo-600');
        };
        
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.logout = () => signOut(auth);
        window.resetForm = () => { document.getElementById('s-code').value=''; document.getElementById('s-name').value=''; document.getElementById('s-shares').value=''; document.getElementById('s-cost').value=''; document.querySelector('details').open=false; };
        window.authAction = async () => {
            const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("登入失敗"); }
        };
    </script>
</head>
<body class="pb-32">
    <div id="auth-page" class="flex flex-col items-center justify-center min-h-screen p-8 bg-slate-900">
        <div class="w-full max-w-sm">
            <h1 class="text-white text-4xl font-black mb-10 text-center">台股精算 <span class="text-indigo-500">Pro</span></h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-800 text-white outline-none">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-800 text-white outline-none">
                <button onclick="authAction()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black text-lg">登入</button>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <header class="px-6 py-8">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 id="total-v" class="text-3xl font-black text-slate-900 tracking-tighter leading-none mb-2">NT$ 0</h2>
                    <span id="total-p" class="px-4 py-1 rounded-full text-[10px] font-bold">載入中...</span>
                </div>
                <button onclick="logout()" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-xs">🚪</button>
            </div>
            
            <nav class="flex justify-between bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                <button onclick="switchTab('inv')" class="tab-btn flex-1 py-3 rounded-xl text-sm font-black text-indigo-600">我的持股</button>
                <button onclick="switchTab('quo')" class="tab-btn flex-1 py-3 rounded-xl text-sm font-black text-slate-400">即時報價</button>
                <button onclick="switchTab('ana')" class="tab-btn flex-1 py-3 rounded-xl text-sm font-black text-slate-400">盤勢分析</button>
            </nav>
        </header>

        <main class="px-6">
            <div id="p-inv"></div>
            <div id="p-quo" class="hidden quo-grid"></div>
            <div id="p-ana" class="hidden">
                <div id="market-idx-box" class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 flex justify-around mb-6">
                    </div>
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100"><canvas id="assetChart"></canvas></div>
            </div>
            <p id="update-time" class="text-center text-[9px] text-slate-300 font-bold mt-6 tracking-widest"></p>
        </main>

        <div class="fixed bottom-6 left-0 right-0 px-6 z-40">
            <details class="bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
                <summary class="list-none p-5 text-center font-black text-indigo-600 cursor-pointer">＋ 快速記錄交易</summary>
                <div class="p-6 space-y-4 bg-slate-50">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="s-code" placeholder="代碼" class="p-4 bg-white rounded-xl outline-none text-sm border border-slate-100">
                        <input type="text" id="s-name" placeholder="名稱" class="p-4 bg-white rounded-xl outline-none text-sm font-bold border border-slate-100">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="s-shares" placeholder="股數" class="p-4 bg-white rounded-xl outline-none text-sm border border-slate-100">
                        <input type="number" id="s-cost" placeholder="成本" class="p-4 bg-white rounded-xl outline-none text-sm border border-slate-100">
                    </div>
                    <button id="btn-save" onclick="saveTransaction()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-black">存入雲端數據</button>
                </div>
            </details>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-t-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-black text-slate-900"></h3>
                <button onclick="closeModal()" class="text-slate-300 text-xl">✕</button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>
</body>
</html>
