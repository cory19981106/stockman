<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台股雲端精算 Pro - 全端旗艦版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .up-red { color: #f43f5e; }
        .down-green { color: #10b981; }
        
        /* 價格跳動特效 */
        @keyframes flash-up { from { background-color: rgba(244, 63, 94, 0.2); } to { background-color: transparent; } }
        @keyframes flash-down { from { background-color: rgba(16, 185, 129, 0.2); } to { background-color: transparent; } }
        .price-up { animation: flash-up 1s ease-out; }
        .price-down { animation: flash-down 1s ease-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 電腦版適配：當寬度 > 1024px */
        @media (min-width: 1024px) {
            .main-container { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; align-items: start; }
            .sticky-side { position: sticky; top: 2rem; }
        }

        .tab-btn.active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
    </style>

    <script type="module">
        // [Firebase 邏輯與之前的保持一致，此處省略重複的部分以節省長度，保持邏輯完整]
        // ... (包含你的 Firebase 初始化、Auth、Firestore 邏輯) ...

        let oldPrices = {}; // 用於比較價格閃爍

        // 渲染函數優化
        function render() {
            const inv = document.getElementById('p-inv');
            const quo = document.getElementById('p-quo');
            inv.innerHTML = ''; quo.innerHTML = '';

            // 數據處理... (省略重複的 sum 邏輯)

            Object.keys(sum).sort().forEach(code => {
                const s = sum[code];
                const isUp = s.info.price >= s.info.prev;
                
                // 檢查是否需要閃爍
                let flashClass = '';
                if(oldPrices[code]) {
                    if(s.info.price > oldPrices[code]) flashClass = 'price-up';
                    else if(s.info.price < oldPrices[code]) flashClass = 'price-down';
                }
                oldPrices[code] = s.info.price;

                // 持股分頁 (電腦一排兩個，手機一排一個)
                inv.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center mb-3 shadow-sm hover:shadow-md transition ${flashClass}" onclick="openModal('${code}')">
                        <div class="truncate">
                            <p class="font-black text-slate-800 text-base truncate">${s.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${code} · ${s.shares} 股</p>
                        </div>
                        <div class="text-right">
                            <p class="${s.info.price >= s.info.prev ? 'up-red' : 'down-green'} text-lg font-black font-mono">${s.info.price.toFixed(2)}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${s.info.pct}%</p>
                        </div>
                    </div>`;

                // 行情分頁 (電腦一排三個，手機一排二個)
                quo.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm ${flashClass}" onclick="alert('${s.name}')">
                        <p class="text-[10px] font-black text-slate-400 mb-1">${code}</p>
                        <p class="text-sm font-bold text-slate-700 truncate mb-2">${s.name}</p>
                        <div class="flex justify-between items-baseline">
                            <span class="text-xl font-black font-mono ${isUp ? 'up-red' : 'down-green'}">${s.info.price.toFixed(2)}</span>
                            <span class="text-[10px] font-bold ${isUp ? 'up-red' : 'down-green'}">${isUp ? '▲' : '▼'}${Math.abs(s.info.pct)}%</span>
                        </div>
                    </div>`;
            });

            // 更新夜盤與總覽 (與之前邏輯相同)
            // ...
        }

        // [其餘邏輯保持不變]
    </script>
</head>
<body class="bg-slate-50 pb-32">

    <div id="main-page" class="hidden max-w-7xl mx-auto px-4 lg:px-8">
        
        <header class="py-8 flex justify-between items-center">
            <h1 class="text-2xl font-black italic">STOCK<span class="text-indigo-600">PRO</span></h1>
            <div class="flex gap-4">
                <span id="update-time" class="text-[10px] font-mono text-slate-400"></span>
                <button onclick="logout()" class="text-xs font-bold text-slate-400">登出</button>
            </div>
        </header>

        <div class="main-container">
            <aside class="sticky-side space-y-6">
                <div class="bg-indigo-600 p-8 rounded-[2.5rem] shadow-xl text-white shadow-indigo-200">
                    <p class="text-indigo-200 text-xs font-bold uppercase tracking-widest mb-2">My Net Worth</p>
                    <h2 id="total-v" class="text-4xl font-black font-mono mb-4 tracking-tighter">NT$ 0</h2>
                    <div id="total-p" class="inline-block">--</div>
                </div>

                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 hidden lg:block">
                    <p class="text-center text-xs font-black text-slate-400 uppercase mb-6 tracking-widest">Allocation</p>
                    <canvas id="assetChart"></canvas>
                </div>
            </aside>

            <section>
                <nav class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100 mb-6">
                    <button onclick="switchTab('inv')" class="tab-btn active flex-1 py-3 rounded-xl text-sm font-black transition">資產損益</button>
                    <button onclick="switchTab('quo')" class="tab-btn flex-1 py-3 rounded-xl text-sm font-black text-slate-400 transition">即時行情</button>
                    <button onclick="switchTab('night')" class="tab-btn flex-1 py-3 rounded-xl text-sm font-black text-slate-400 transition">夜盤盤後</button>
                </nav>

                <div id="p-inv" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                
                <div id="p-quo" class="hidden grid grid-cols-2 md:grid-cols-3 gap-3"></div>

                <div id="p-night" class="hidden">
                    <div id="p-night-box"></div>
                </div>
            </section>
        </div>

        <div class="fixed bottom-8 left-0 right-0 px-6 z-40 flex justify-center">
            <details class="bg-white/90 backdrop-blur-md w-full max-w-lg rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
                <summary class="list-none p-5 text-center font-black text-indigo-600 cursor-pointer hover:bg-white">
                    <span class="text-lg">＋</span> 快速新增持股
                </summary>
                <div class="p-8 space-y-4 bg-white/50 border-t">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="s-code" oninput="handleCodeInput(this.value)" placeholder="股票代碼" class="p-4 rounded-2xl bg-slate-100 outline-none text-sm font-bold">
                        <input type="text" id="s-name" placeholder="名稱" class="p-4 rounded-2xl bg-slate-100 outline-none text-sm font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="s-shares" placeholder="股數" class="p-4 rounded-2xl bg-slate-100 outline-none text-sm font-bold">
                        <input type="number" id="s-cost" placeholder="成本" class="p-4 rounded-2xl bg-slate-100 outline-none text-sm font-bold">
                    </div>
                    <button onclick="saveTransaction()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black shadow-lg shadow-indigo-100">確認存入雲端</button>
                </div>
            </details>
        </div>
    </div>

    </body>
</html>
