<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台股雲端精算 Pro - 頂級設計版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --up-color: #f43f5e;
            --down-color: #10b981;
        }

        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 價格閃爍動畫 */
        @keyframes flash-red { 0% { background-color: rgba(244, 63, 94, 0.2); } 100% { background-color: transparent; } }
        @keyframes flash-green { 0% { background-color: rgba(16, 185, 129, 0.2); } 100% { background-color: transparent; } }
        .price-up-flash { animation: flash-red 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .price-down-flash { animation: flash-green 1s cubic-bezier(0.4, 0, 0.2, 1); }

        /* 行情格佈局：手機一排兩個 */
        .quo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 1024px) { .quo-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 玻璃擬態與陰影 */
        .soft-card { background: white; border: 1px solid rgba(226, 232, 240, 0.6); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.2s; }
        .soft-card:active { transform: scale(0.97); background-color: #f1f5f9; }

        /* 台指期夜盤戰情室風格 */
        .night-session-card {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .live-dot {
            width: 8px; height: 8px; background-color: var(--up-color);
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 10px var(--up-color);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 參數設定
        const firebaseConfig = {
            apiKey: "AIzaSyDsT-DHIht7TASNmb7GrUzJdAVxIlNNIMw",
            authDomain: "stock-d7721.firebaseapp.com",
            projectId: "stock-d7721",
            storageBucket: "stock-d7721.firebasestorage.app",
            messagingSenderId: "238076969385",
            appId: "1:238076969385:web:10428fe81c77e51b8584b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let stocks = [];
        let currentPrices = {};
        let oldPrices = {};
        let nightInfo = { tx: { price: 0, pct: 0, change: 0 } };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                await loadStocks();
                startSync();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-page').classList.add('hidden');
            }
        });

        async function loadStocks() {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (docSnap.exists()) stocks = docSnap.data().stocks || [];
            render();
        }

        async function fetchPrice(code) {
            for(let s of ['.TW', '.TWO']) {
                try {
                    const res = await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${code}${s}`);
                    const data = await res.json();
                    if(data.chart.result) {
                        const m = data.chart.result[0].meta;
                        if (!oldPrices[code]) oldPrices[code] = m.regularMarketPrice;
                        currentPrices[code] = { 
                            price: m.regularMarketPrice, 
                            prev: m.previousClose, 
                            pct: ((m.regularMarketPrice - m.previousClose) / m.previousClose * 100).toFixed(2),
                            lastUpdate: Date.now()
                        };
                        render(); break;
                    }
                } catch(e) {}
            }
        }

        async function fetchNight() {
            try {
                const res = await fetch(`https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/WTX%3DF`);
                const data = await res.json();
                const m = data.chart.result[0].meta;
                nightInfo.tx = { 
                    price: m.regularMarketPrice, 
                    change: (m.regularMarketPrice - m.previousClose).toFixed(0), 
                    pct: ((m.regularMarketPrice - m.previousClose) / m.previousClose * 100).toFixed(2) 
                };
                render();
            } catch(e) {}
        }

        function startSync() {
            const sync = () => {
                [...new Set(stocks.map(s => s.code))].forEach(fetchPrice);
                fetchNight();
                document.getElementById('update-time').innerText = `Sync: ${new Date().toLocaleTimeString()}`;
            };
            sync();
            setInterval(sync, 15000);
        }

        function render() {
            const inv = document.getElementById('p-inv');
            const quo = document.getElementById('p-quo');
            const nightBox = document.getElementById('p-night-box');
            inv.innerHTML = ''; quo.innerHTML = '';

            const sum = {};
            stocks.forEach(s => {
                if(!sum[s.code]) sum[s.code] = { name: s.name, shares: 0, cost: 0, info: currentPrices[s.code] || { price: 0, prev: 0, pct: 0 } };
                sum[s.code].shares += s.shares;
                sum[s.code].cost += (s.shares * s.cost);
            });

            Object.keys(sum).sort().forEach(code => {
                const s = sum[code];
                const isUp = s.info.price >= s.info.prev;
                
                // 決定跳動顏色
                let flashClass = '';
                if(oldPrices[code] < s.info.price) flashClass = 'price-up-flash';
                else if(oldPrices[code] > s.info.price) flashClass = 'price-down-flash';
                oldPrices[code] = s.info.price;

                // 即時行情：一排兩個，極簡設計
                quo.innerHTML += `
                    <div class="soft-card p-4 rounded-3xl flex flex-col justify-between ${flashClass}" onclick="alert('${s.name}')">
                        <div class="flex justify-between items-start">
                            <span class="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-0.5 rounded-lg uppercase">${code}</span>
                            <span class="text-[11px] font-black ${isUp ? 'text-rose-500' : 'text-emerald-500'}">
                                ${isUp ? '▲' : '▼'}${Math.abs(s.info.pct)}%
                            </span>
                        </div>
                        <div class="mt-3">
                            <p class="text-xs font-bold text-slate-400 truncate mb-1">${s.name}</p>
                            <p class="text-2xl font-black font-mono tracking-tighter ${isUp ? 'text-rose-500' : 'text-emerald-500'}">
                                ${s.info.price.toFixed(2)}
                            </p>
                        </div>
                    </div>`;

                // 資產損益（清單模式）
                const profit = (s.shares * s.info.price) - s.cost; // 這裡簡化計算，若需精算請套用之前邏輯
                inv.innerHTML += `
                    <div class="soft-card p-5 rounded-3xl mb-3 flex justify-between items-center" onclick="openModal('${code}')">
                        <div class="flex-1 truncate pr-4">
                            <p class="text-base font-black text-slate-800 truncate">${s.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${code} · ${s.shares.toLocaleString()} 股</p>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black font-mono ${profit >= 0 ? 'text-rose-500' : 'text-emerald-500'}">
                                ${profit > 0 ? '+' : ''}${Math.round(profit).toLocaleString()}
                            </p>
                            <p class="text-[10px] font-bold text-slate-300">NET PROFIT</p>
                        </div>
                    </div>`;
            });

            // 夜盤 Hero Card
            const nIsUp = nightInfo.tx.change >= 0;
            nightBox.innerHTML = `
                <div class="night-session-card p-8 rounded-[2.5rem] text-center text-white relative overflow-hidden">
                    <div class="absolute top-4 right-6 flex items-center gap-2">
                        <span class="live-dot"></span>
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Live Trading</span>
                    </div>
                    <p class="text-indigo-400 text-[10px] font-black tracking-[0.2em] mb-4 uppercase">台指期夜盤行情</p>
                    <h3 class="text-6xl font-black font-mono tracking-tighter mb-4 ${nIsUp ? 'text-rose-500' : 'text-emerald-400'}">
                        ${nightInfo.tx.price}
                    </h3>
                    <div class="flex justify-center gap-4">
                        <span class="px-5 py-2 rounded-2xl bg-white/5 text-sm font-black ${nIsUp ? 'text-rose-500' : 'text-emerald-400'}">
                            ${nIsUp ? '+' : ''}${nightInfo.tx.change}
                        </span>
                        <span class="px-5 py-2 rounded-2xl bg-white/5 text-sm font-black ${nIsUp ? 'text-rose-500' : 'text-emerald-400'}">
                            ${nightInfo.tx.pct}%
                        </span>
                    </div>
                </div>`;
            
            // 總覽數字
            let gVal = Object.values(sum).reduce((a, b) => a + (b.shares * b.info.price), 0);
            document.getElementById('total-v').innerText = `NT$ ${Math.round(gVal).toLocaleString()}`;
        }

        // 基本 UI 切換
        window.switchTab = (tab) => {
            ['p-inv', 'p-quo', 'p-night'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(`p-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('text-indigo-600', 'border-indigo-600'));
            event.currentTarget.classList.add('text-indigo-600', 'border-indigo-600');
        };
        window.logout = () => signOut(auth);
        window.authAction = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("登入失敗"); }
        };
    </script>
</head>
<body class="pb-40">

    <div id="auth-page" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-8">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-white text-4xl font-black italic mb-2">STOCK<span class="text-indigo-500">PRO</span></h1>
            <p class="text-slate-500 text-sm mb-12">您的私人雲端精算助理</p>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-5 rounded-3xl bg-slate-800 text-white outline-none border-none">
                <input type="password" id="pass" placeholder="Password" class="w-full p-5 rounded-3xl bg-slate-800 text-white outline-none border-none">
                <button onclick="authAction()" class="w-full bg-indigo-600 text-white p-5 rounded-3xl font-black text-lg shadow-xl shadow-indigo-900/40">登入系統</button>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <header class="bg-white px-6 pt-10 pb-6 rounded-b-[3rem] shadow-sm">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Net Worth</p>
                    <h2 id="total-v" class="text-3xl font-black text-slate-900 tracking-tighter">NT$ 0</h2>
                </div>
                <button onclick="logout()" class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center border border-slate-100 text-xl">👤</button>
            </div>
            
            <nav class="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                <button onclick="switchTab('inv')" class="tab-btn flex-1 py-3 text-sm font-black rounded-xl transition bg-white text-indigo-600 shadow-sm border-b-2 border-indigo-600">持股損益</button>
                <button onclick="switchTab('quo')" class="tab-btn flex-1 py-3 text-sm font-black rounded-xl transition text-slate-400">即時行情</button>
                <button onclick="switchTab('night')" class="tab-btn flex-1 py-3 text-sm font-black rounded-xl transition text-slate-400">夜盤盤後</button>
            </nav>
        </header>

        <main class="p-6">
            <div id="p-inv" class="space-y-1"></div>
            <div id="p-quo" class="hidden quo-grid"></div>
            <div id="p-night" class="hidden">
                <div id="p-night-box"></div>
                <div class="mt-8 p-8 bg-white rounded-[2.5rem] border border-slate-100 text-center">
                    <p class="text-slate-300 text-xs font-bold uppercase tracking-widest mb-4">Market Sentiment</p>
                    <div class="flex justify-around">
                        <div class="text-center"><p class="text-2xl font-black text-slate-800">22,450</p><p class="text-[9px] text-slate-400">加權指數</p></div>
                        <div class="text-center"><p class="text-2xl font-black text-slate-800">4,320億</p><p class="text-[9px] text-slate-400">預估成交量</p></div>
                    </div>
                </div>
            </div>
            <p id="update-time" class="text-center text-[9px] text-slate-300 font-bold mt-10 uppercase tracking-[0.2em]"></p>
        </main>

        <div class="fixed bottom-8 left-0 right-0 px-6 z-40">
            <details class="bg-white/80 backdrop-blur-xl rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
                <summary class="list-none p-5 text-center font-black text-indigo-600 cursor-pointer select-none">＋ 快速調整庫存</summary>
                <div class="p-6 space-y-4 bg-white/50 border-t border-slate-100">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="s-code" placeholder="代碼" class="p-4 rounded-2xl bg-slate-100 outline-none text-sm font-bold">
                        <input type="text" id="s-name" placeholder="名稱" class="p-4 rounded-2xl bg-slate-100 outline-none text-sm font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="s-shares" placeholder="股數" class="p-4 rounded-2xl bg-slate-100 outline-none text-sm font-bold">
                        <input type="number" id="s-cost" placeholder="成本" class="p-4 rounded-2xl bg-slate-100 outline-none text-sm font-bold">
                    </div>
                    <button onclick="saveTransaction()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-black">更新雲端紀錄</button>
                </div>
            </details>
        </div>
    </div>
</body>
</html>
