<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台股精算 Pro - 穩定修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        :root { --up-color: #f43f5e; --down-color: #10b981; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .up-red { color: var(--up-color); }
        .down-green { color: var(--down-color); }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 圖表外框：確保 Iframe 比例正確 */
        .iframe-container { position: relative; width: 100%; height: 320px; border-radius: 1.5rem; overflow: hidden; background: #f1f5f9; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase 配置 (保持不變)
        const firebaseConfig = {
            apiKey: "AIzaSyDsT-DHIht7TASNmb7GrUzJdAVxIlNNIMw",
            authDomain: "stock-d7721.firebaseapp.com",
            projectId: "stock-d7721",
            storageBucket: "stock-d7721.firebasestorage.app",
            messagingSenderId: "238076969385",
            appId: "1:238076969385:web:10428fe81c77e51b8584b8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, stocks = [], watchlist = [], currentPrices = {}, chartInstance = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                await loadUserData();
                startSync();
            } else {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-page').classList.add('hidden');
            }
        });

        async function loadUserData() {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                stocks = data.stocks || []; watchlist = data.watchlist || [];
            }
            render();
        }

        async function saveUserData() { await setDoc(doc(db, "users", currentUser.uid), { stocks, watchlist }); }

        // 修改：使用更穩定的 Proxy 抓取數據
        window.fetchPrice = async (code) => {
            const symbols = [`${code}.TW`, `${code}.TWO`];
            for(let sym of symbols) {
                try {
                    // 換一個 Proxy 來源
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}`)}`);
                    const json = await res.json();
                    const data = JSON.parse(json.contents);
                    
                    if(data.chart.result) {
                        const m = data.chart.result[0].meta;
                        currentPrices[code] = { 
                            price: m.regularMarketPrice, 
                            prev: m.previousClose, 
                            pct: ((m.regularMarketPrice - m.previousClose) / m.previousClose * 100).toFixed(2),
                            exchange: sym.includes('.TWO') ? 'OTC' : 'TWSE'
                        };
                        render(); break;
                    }
                } catch(e) { console.error("Fetch Error:", e); }
            }
        };

        window.fetchAllData = () => {
            const allCodes = [...new Set([...stocks.map(s => s.code), ...watchlist.map(w => w.code)])];
            allCodes.forEach(fetchPrice);
            document.getElementById('update-time').innerText = `最後更新: ${new Date().toLocaleTimeString()}`;
        };

        function startSync() { fetchAllData(); setInterval(fetchAllData, 30000); }

        function render() {
            const inv = document.getElementById('p-inv'), quo = document.getElementById('p-quo'), watchListDiv = document.getElementById('p-watch-list');
            inv.innerHTML = ''; quo.innerHTML = ''; watchListDiv.innerHTML = '';

            const sum = {};
            stocks.forEach(s => {
                if(!sum[s.code]) sum[s.code] = { name: s.name, shares: 0, cost: 0, info: currentPrices[s.code] || { price: 0, prev: 0, pct: 0 } };
                sum[s.code].shares += s.shares; sum[s.code].cost += (s.shares * s.cost);
            });

            let gV = 0, gP = 0, gPaid = 0;
            Object.keys(sum).sort().forEach(code => {
                const s = sum[code];
                const profit = (s.shares * s.info.price) - s.cost;
                gV += (s.shares * s.info.price); gPaid += s.cost; gP += profit;

                inv.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl mb-3 border border-slate-100 card-shadow flex justify-between items-center" onclick="openStockDetails('${code}')">
                        <div class="flex-1 min-w-0">
                            <p class="font-extrabold text-slate-800 text-lg truncate-name">${s.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${code} · ${s.shares.toLocaleString()} 股</p>
                        </div>
                        <div class="text-right">
                            <p class="${profit >= 0 ? 'up-red' : 'down-green'} text-lg font-extrabold font-mono">${profit > 0 ? '+' : ''}${Math.round(profit).toLocaleString()}</p>
                            <p class="text-[10px] font-black text-slate-300">📈 點擊詳情</p>
                        </div>
                    </div>`;
            });

            watchlist.forEach(w => {
                const info = currentPrices[w.code] || { price: 0, prev: 0, pct: 0 };
                const isUp = info.price >= info.prev;
                watchListDiv.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border border-slate-50 card-shadow flex justify-between items-center mb-3" onclick="openStockDetails('${w.code}')">
                        <div class="flex-1">
                            <p class="font-extrabold text-slate-800 text-base truncate-name">${w.name}</p>
                            <p class="text-[11px] text-slate-400 font-bold">${w.code}</p>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <div>
                                <p class="${isUp ? 'up-red' : 'down-green'} text-lg font-extrabold font-mono">${info.price.toFixed(2)}</p>
                                <p class="${isUp ? 'up-red' : 'down-green'} text-[10px] font-bold">${isUp?'▲':'▼'}${Math.abs(info.pct)}%</p>
                            </div>
                        </div>
                    </div>`;
            });
            
            document.getElementById('total-v').innerText = `NT$ ${Math.round(gV).toLocaleString()}`;
            document.getElementById('total-p').innerText = `${gP >= 0 ? '+' : ''}${Math.round(gP).toLocaleString()} (${gPaid > 0 ? ((gP/gPaid)*100).toFixed(2) : '0.00'}%)`;
            document.getElementById('total-p').className = `text-sm font-extrabold mt-1 px-3 py-1 rounded-full inline-block ${gP >= 0 ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-500'}`;
        }

        window.openStockDetails = (code) => {
            const info = currentPrices[code] || { exchange: 'TWSE' };
            const name = watchlist.find(w => w.code === code)?.name || stocks.find(s => s.code === code)?.name || code;
            document.getElementById('modal-title').innerText = `${name} (${code})`;
            
            // 強制切換：改用 Iframe 版圖表，這最不容易被擋
            const exch = info.exchange === 'OTC' ? 'OTC' : 'TWSE';
            const tvUrl = `https://s.tradingview.com/widgetembed/?symbol=${exch}:${code}&interval=D&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=[]&theme=light&style=1&timezone=Asia%2FTaipei&studies_overrides={}&overrides={}&enabled_features=[]&disabled_features=[]&locale=zh_TW`;
            
            document.getElementById('tv-frame-container').innerHTML = `
                <div class="iframe-container shadow-inner border border-slate-100 mb-6">
                    <iframe src="${tvUrl}" allowtransparency="true" scrolling="no" allowfullscreen></iframe>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <a href="https://tw.stock.yahoo.com/quote/${code}" target="_blank" class="bg-indigo-600 text-white p-4 rounded-2xl text-center text-xs font-bold shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                        <span>📊</span> 原生 K 線 (不被擋)
                    </a>
                    <a href="https://www.wantgoo.com/stock/${code}" target="_blank" class="bg-slate-100 text-slate-700 p-4 rounded-2xl text-center text-xs font-bold flex items-center justify-center gap-2">
                        <span>🔍</span> 財報分析
                    </a>
                </div>
                <button onclick="copyAICmd('${code}', '${name}')" class="w-full bg-slate-900 text-white p-4 rounded-2xl text-sm font-black mb-6 active:scale-95 transition-all">
                    ✨ 複製 AI 診斷指令
                </button>
            `;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.copyAICmd = (code, name) => {
            const cmd = `請分析台股「${name} (${code})」。包含營收趨勢、技術面支撐與未來展望。`;
            navigator.clipboard.writeText(cmd).then(() => alert('指令已複製！請貼給 AI。'));
        };

        window.switchTab = (tab) => {
            ['p-inv', 'p-watch', 'p-ana'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(`p-${tab}`).classList.remove('hidden');
            document.getElementById('floating-add-area').classList.toggle('hidden', tab !== 'inv');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('text-indigo-600', 'text-slate-400'));
            event.currentTarget.classList.replace('text-slate-400', 'text-indigo-600');
        };
        
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.logout = () => signOut(auth);
        window.resetForm = () => { document.getElementById('s-code').value=''; document.getElementById('s-name').value=''; document.getElementById('add-details').open = false; };
        window.authAction = async () => {
            const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("登入失敗"); }
        };
    </script>
</head>
<body class="pb-32 bg-[#F8FAFC]">

    <div id="auth-page" class="flex flex-col items-center justify-center min-h-screen p-8 bg-slate-900 text-center">
        <h1 class="text-white text-4xl font-black mb-10">台股精算 <span class="text-indigo-500">Pro</span></h1>
        <div class="w-full max-w-sm space-y-4">
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-800 text-white outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-800 text-white outline-none">
            <button onclick="authAction()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-xl shadow-indigo-500/20">進入系統</button>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <header class="px-6 pt-12 pb-6 sticky top-0 bg-[#F8FAFC]/90 backdrop-blur-md z-30">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <p class="text-slate-400 text-[10px] font-black tracking-widest uppercase mb-1">Portfolio Balance</p>
                    <h2 id="total-v" class="text-3xl font-black text-slate-900 tracking-tighter tabular-nums leading-none">NT$ 0</h2>
                    <div id="total-p">--</div>
                </div>
                <button onclick="logout()" class="w-12 h-12 rounded-2xl bg-white shadow-sm border border-slate-100 flex items-center justify-center active:scale-90 transition-all">🚪</button>
            </div>
            <nav class="flex justify-between glass-nav p-1.5 rounded-[1.5rem] border border-slate-200 shadow-sm">
                <button onclick="switchTab('inv')" class="tab-btn flex-1 py-3 rounded-2xl text-xs font-black text-indigo-600 transition-all">我的持股</button>
                <button onclick="switchTab('watch')" class="tab-btn flex-1 py-3 rounded-2xl text-xs font-black text-slate-400 transition-all">自選組合</button>
                <button onclick="switchTab('ana')" class="tab-btn flex-1 py-3 rounded-2xl text-xs font-black text-slate-400 transition-all">資產分析</button>
            </nav>
        </header>

        <main class="px-6">
            <div id="p-inv"></div>
            <div id="p-watch" class="hidden">
                <div class="bg-indigo-600 p-6 rounded-[2.5rem] mb-6 shadow-xl shadow-indigo-100">
                    <p class="text-indigo-100 text-[10px] font-black uppercase mb-4 tracking-widest">快速加入自選</p>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <input type="text" id="w-code" placeholder="代碼" class="p-4 rounded-2xl text-sm outline-none border-none">
                        <input type="text" id="w-name" placeholder="名稱" class="p-4 rounded-2xl text-sm outline-none border-none font-bold">
                    </div>
                    <button onclick="addToWatchlist()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs active:scale-95 transition-all">＋ 加入清單</button>
                </div>
                <div id="p-watch-list"></div>
            </div>
            <div id="p-ana" class="hidden">
                <div class="bg-white p-8 rounded-[3rem] card-shadow text-center">
                    <div class="w-48 h-48 mx-auto mb-8"><canvas id="assetChart"></canvas></div>
                    <div id="ana-list" class="space-y-2"></div>
                </div>
            </div>
        </main>

        <div id="floating-add-area" class="fixed bottom-8 left-0 right-0 px-6 z-40">
            <details id="add-details" class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
                <summary class="p-5 text-center font-black text-indigo-600 cursor-pointer active:bg-slate-50">＋ 新增庫存紀錄</summary>
                <div class="p-8 space-y-4 border-t border-slate-50">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="s-code" placeholder="股票代碼" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm">
                        <input type="text" id="s-name" placeholder="名稱" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="s-shares" placeholder="股數" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm">
                        <input type="number" id="s-cost" placeholder="成本" class="p-4 bg-slate-50 rounded-2xl outline-none text-sm">
                    </div>
                    <button onclick="saveTransaction()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black active:scale-95 transition-all shadow-lg shadow-indigo-200">存入雲端數據</button>
                </div>
            </details>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-black text-slate-900"></h3>
                <button onclick="closeModal()" class="w-12 h-12 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center">✕</button>
            </div>
            <div id="tv-frame-container"></div>
        </div>
    </div>

</body>
</html>
